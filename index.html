<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNU-TUW Urban Planning Workshop 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:#fff;color:#000;font-family:'Inter',sans-serif;font-weight:400;font-size:14px;line-height:1.6;}

/* ── NAV ── */
nav{background:#000;position:sticky;top:0;z-index:200;height:48px;display:flex;align-items:center;padding:0 40px;justify-content:space-between;gap:12px;}
.logo{font-size:10px;letter-spacing:.15em;color:#fff;text-transform:uppercase;font-weight:800;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.nav-center{display:flex;align-items:center;gap:2px;flex:1;justify-content:center;}
.nl{font-size:9px;letter-spacing:.1em;padding:4px 12px;cursor:pointer;color:rgba(255,255,255,.4);transition:all .15s;text-transform:uppercase;font-weight:700;border-radius:2px;white-space:nowrap;}
.nl:hover{color:#fff;}
.nl.on{color:#000;background:#fff;}
.lang-group{display:flex;gap:3px;flex-shrink:0;}
.lang-btn{font-size:9px;letter-spacing:.08em;padding:4px 9px;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.4);cursor:pointer;font-weight:700;text-transform:uppercase;transition:all .15s;border-radius:2px;font-family:'Inter',sans-serif;background:transparent;}
.lang-btn.on{background:#fff;color:#000;border-color:#fff;}
.lang-btn:hover:not(.on){border-color:rgba(255,255,255,.6);color:rgba(255,255,255,.9);}

/* ── HERO ── */
.hero{padding:64px 40px 44px;border-bottom:2px solid #000;}
.hero-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#888;margin-bottom:12px;font-weight:700;}
.hero h1{font-size:clamp(32px,5vw,62px);font-weight:900;line-height:1.0;letter-spacing:-.03em;margin-bottom:14px;}
.hero-desc{font-size:13.5px;line-height:1.85;color:#444;max-width:580px;font-weight:300;}

/* ── STATS ── */
.stats-row{display:flex;border-bottom:2px solid #000;flex-wrap:wrap;}
.stat-cell{flex:1;min-width:130px;padding:18px 24px;border-right:1px solid #e0e0e0;}
.stat-cell:last-child{border-right:none;}
.sn{font-size:24px;font-weight:900;letter-spacing:-.03em;margin-bottom:2px;}
.sl{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:#888;font-weight:700;}

/* ── MAP ── */
.map-section{max-width:960px;margin:0 auto;padding:0 40px 48px;}
.map-label{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:#888;padding:28px 0 12px;font-weight:700;}
.map-wrap{position:relative;display:inline-block;max-width:520px;width:100%;}
.map-wrap img{width:100%;display:block;border:2px solid #000;}
.map-dot{position:absolute;transform:translate(-50%,-50%);width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:#fff;cursor:pointer;transition:transform .15s;background:#000;border:2px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,.5);}
.map-dot:hover{transform:translate(-50%,-50%) scale(1.35);}
.map-dot .tip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#000;color:#fff;font-size:8px;font-weight:700;white-space:nowrap;padding:3px 8px;border-radius:2px;opacity:0;transition:opacity .15s;pointer-events:none;z-index:10;letter-spacing:.04em;}
.map-dot:hover .tip{opacity:1;}

/* ── SPOT GRID ── */
.spots-section{max-width:960px;margin:0 auto;padding:0 40px 80px;}
.sec-title{font-size:20px;font-weight:900;letter-spacing:-.02em;margin-bottom:18px;}
.spots-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:#000;border:1px solid #000;}
.scard{background:#fff;padding:18px 20px;cursor:pointer;transition:background .12s;}
.scard:hover{background:#f5f5f5;}
.scard-num{font-size:8px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:5px;font-weight:700;color:#888;}
.scard-main{font-size:13px;font-weight:700;letter-spacing:-.01em;margin-bottom:1px;}
.scard-sub{font-size:10px;color:#888;margin-bottom:9px;font-weight:400;}
.scard-tags{display:flex;flex-wrap:wrap;gap:3px;align-items:center;}
.stag{font-size:7px;letter-spacing:.07em;padding:2px 6px;background:#f0f0f0;color:#888;border:1px solid #e0e0e0;font-weight:600;text-transform:uppercase;}
.scard-arr{margin-left:auto;font-size:13px;font-weight:900;}

/* ── SPOT DETAIL ── */
.spot-top{padding:40px 40px 26px;border-bottom:2px solid #000;}
.spot-top-inner{max-width:960px;margin:0 auto;}
.spot-badge{width:40px;height:40px;border-radius:50%;background:#000;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;margin-bottom:14px;}
.spot-main{font-size:clamp(22px,4vw,36px);font-weight:900;letter-spacing:-.03em;margin-bottom:3px;}
.spot-sub{font-size:10px;color:#888;margin-bottom:14px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;}
.tag-row{display:flex;flex-wrap:wrap;gap:4px;}
.spot-tag{font-size:8px;letter-spacing:.09em;padding:3px 9px;background:#f0f0f0;color:#888;border:1px solid #e0e0e0;font-weight:700;text-transform:uppercase;}

.spot-wrap{max-width:960px;margin:0 auto;padding:30px 40px 80px;}
.crumb{display:flex;align-items:center;gap:8px;margin-bottom:24px;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;}
.crumb span{cursor:pointer;}
.crumb span:hover{color:#000;}
.crumb-sep{color:#ccc;}

.stat-boxes{display:flex;gap:1px;margin-bottom:20px;background:#000;border:1px solid #000;flex-wrap:wrap;}
.sbox{background:#fff;padding:12px 18px;flex:1;min-width:100px;}
.sb-n{font-size:20px;font-weight:900;letter-spacing:-.02em;margin-bottom:1px;}
.sb-l{font-size:8px;color:#888;letter-spacing:.12em;text-transform:uppercase;font-weight:700;}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1px;margin-bottom:1px;background:#000;}
.cbox{background:#fff;padding:22px 24px;}
.cbox-full{background:#fff;border:1px solid #000;padding:22px 24px;margin-bottom:1px;}
.clabel{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:#888;padding-bottom:10px;border-bottom:1px solid #e0e0e0;margin-bottom:12px;font-weight:700;}

.btext{font-size:13px;line-height:1.9;color:#333;font-weight:300;}
.btext+.btext{margin-top:10px;}

.ilist{list-style:none;display:flex;flex-direction:column;gap:9px;}
.iitem{display:flex;gap:10px;font-size:12px;color:#333;line-height:1.65;font-weight:300;}
.idot{width:4px;height:4px;border-radius:50%;margin-top:9px;flex-shrink:0;background:#000;}

.shtable{width:100%;border-collapse:collapse;}
.shtable th{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:#888;text-align:left;padding:7px 12px;border-bottom:2px solid #000;background:#f5f5f5;font-weight:700;}
.shtable td{padding:9px 12px;border-bottom:1px solid #e0e0e0;font-size:12px;color:#333;line-height:1.6;vertical-align:top;font-weight:300;}
.shtable tr:last-child td{border-bottom:none;}
.sh-role{font-weight:700;color:#000;font-size:12px;display:block;margin-bottom:1px;}

.quote{font-size:13px;line-height:1.8;color:#444;padding:14px 18px;border-left:3px solid #000;background:#f5f5f5;margin-top:14px;font-weight:300;font-style:italic;}

.spot-nav{display:flex;justify-content:space-between;margin-top:28px;padding-top:18px;border-top:2px solid #000;gap:8px;}
.snbtn{display:flex;align-items:center;gap:7px;padding:9px 16px;border:2px solid #000;cursor:pointer;background:#fff;font-size:11px;color:#000;transition:all .15s;font-weight:700;font-family:'Inter',sans-serif;}
.snbtn:hover{background:#000;color:#fff;}
.snbtn.dim{opacity:.2;pointer-events:none;}
.sncenter{font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:9px 16px;border:2px solid #000;cursor:pointer;background:#f5f5f5;color:#000;font-weight:700;font-family:'Inter',sans-serif;}
.sncenter:hover{background:#000;color:#fff;}

/* ── GLOSSARY ── */
.dark-hero{background:#000;padding:64px 40px 44px;}
.dark-hero .hero-label{color:rgba(255,255,255,.3);}
.dark-hero h1{color:#fff;font-size:clamp(28px,4.5vw,52px);font-weight:900;line-height:1.0;letter-spacing:-.03em;margin-bottom:4px;}
.dark-hero p{font-size:9px;letter-spacing:.18em;color:#555;text-transform:uppercase;font-weight:700;}

.gloss-wrap{max-width:960px;margin:0 auto;padding:36px 40px 80px;}
.gloss-intro{font-size:12px;color:#888;margin-bottom:28px;font-weight:400;}

.gtable{width:100%;border-collapse:collapse;}
.gtable th{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:#888;text-align:left;padding:8px 14px;border-bottom:2px solid #000;background:#f5f5f5;font-weight:700;}
.gtable td{padding:9px 14px;border-bottom:1px solid #e0e0e0;font-size:12px;line-height:1.5;vertical-align:top;}
.gtable tr:hover td{background:#fafafa;}
.g-ko{font-weight:700;color:#000;}
.g-de{font-size:11px;color:#444;font-weight:500;}
.g-en{font-size:10px;color:#666;font-weight:400;}
.g-note{color:#888;font-size:11px;font-weight:300;}
.cat-row td{background:#000!important;color:#fff;font-size:8px;letter-spacing:.18em;text-transform:uppercase;padding:7px 14px;border-bottom:none;font-weight:800;}

/* ── SCHEDULE ── */
.sch-content{max-width:640px;margin:0 auto;padding:0 40px 80px;}
.view-toggle{display:flex;gap:4px;padding:32px 0 4px;}
.view-btn{padding:8px 18px;border:2px solid #000;background:transparent;cursor:pointer;font-family:'Inter',sans-serif;font-size:9px;font-weight:700;letter-spacing:.1em;color:#888;transition:all .15s;text-transform:uppercase;}
.view-btn.on{background:#000;color:#fff;border-color:#000;}
.view-btn:hover:not(.on){background:#f5f5f5;}

.sv-phase{margin-top:28px;margin-bottom:32px;}
.sv-phase-label{font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:#888;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-weight:700;border-bottom:2px solid #000;padding-bottom:8px;}
.sv-pill{font-size:8px;padding:2px 8px;background:#000;color:#fff;font-weight:800;letter-spacing:.08em;}

.sv-row{display:grid;grid-template-columns:60px 1fr;border-bottom:1px solid #e0e0e0;}
.sv-row:last-child{border-bottom:none;}
.sv-day{padding:14px 10px 14px 0;text-align:right;border-right:2px solid #000;}
.sv-d{font-size:22px;font-weight:900;line-height:1;letter-spacing:-.03em;}
.sv-w{font-size:8px;color:#888;margin-top:2px;font-weight:700;letter-spacing:.08em;}
.sv-body{padding:12px 0 12px 16px;display:flex;flex-direction:column;gap:6px;}
.sv-line{display:flex;gap:8px;align-items:baseline;}
.sv-t{font-size:8px;color:#888;min-width:26px;font-weight:700;letter-spacing:.04em;flex-shrink:0;text-transform:uppercase;}
.sv-c{font-size:12.5px;line-height:1.5;font-weight:400;}

.etag{display:inline-block;font-size:7px;letter-spacing:.08em;padding:2px 6px;font-weight:800;text-transform:uppercase;margin-right:5px;vertical-align:1px;}
.etag-field{background:#000;color:#fff;}
.etag-intro{background:#444;color:#fff;}
.etag-work{background:#000;color:#fff;}
.etag-pres{background:#000;color:#fff;}
.etag-free{background:#e0e0e0;color:#888;}

.sv-route{font-size:10px;color:#888;margin-top:3px;padding:5px 10px;background:#f5f5f5;border-left:2px solid #000;line-height:1.6;}

.dv-wrap{display:none;padding-top:4px;}
.dv-day{margin-top:28px;}
.dv-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid #000;flex-wrap:wrap;}
.dv-date{font-size:16px;font-weight:900;letter-spacing:-.02em;}
.dv-room{font-size:8px;color:#888;padding:2px 8px;border:1px solid #e0e0e0;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
.dv-phase-tag{font-size:8px;padding:2px 9px;background:#000;color:#fff;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-left:auto;}

.dv-block{display:grid;grid-template-columns:100px 1fr;margin-bottom:1px;}
.dv-time{font-size:9px;color:#888;padding:9px 10px 9px 0;text-align:right;border-right:2px solid #000;line-height:1.4;font-weight:600;letter-spacing:.02em;}
.dv-info{padding:8px 0 8px 14px;}
.dv-name{font-size:12.5px;line-height:1.5;font-weight:400;}
.dv-note{font-size:10px;color:#888;line-height:1.5;margin-top:2px;font-weight:300;}
.dv-break .dv-time{color:#ccc;}
.dv-break .dv-name{color:#bbb;font-size:11px;}

/* ── FOOTER ── */
footer{border-top:2px solid #000;background:#fff;padding:16px 40px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.f1{font-size:9px;letter-spacing:.12em;color:#888;text-transform:uppercase;font-weight:700;}

@media(max-width:720px){
  nav{padding:0 16px;}
  .nav-center{display:none;}
  .logo{font-size:9px;}
  .hero,.map-section,.spots-section,.spot-top,.spot-wrap,.dark-hero,.gloss-wrap,.sch-content,footer{padding-left:20px;padding-right:20px;}
  .sch-content{padding-left:20px;padding-right:20px;}
  .spots-grid,.two-col{grid-template-columns:1fr;}
  .stat-cell{flex:0 0 50%;}
  .dv-block{grid-template-columns:76px 1fr;}
  footer{flex-direction:column;gap:4px;text-align:center;}
}
</style>
</head>
<body>

<nav>
  <span class="logo" onclick="go('home')">SNU × TUW 2026</span>
  <div class="nav-center">
    <span class="nl" id="nl-home"  onclick="go('home')" ></span>
    <span class="nl" id="nl-site"  onclick="go('site')" ></span>
    <span class="nl" id="nl-gloss" onclick="go('gloss')"></span>
    <span class="nl" id="nl-sched" onclick="go('sched')"></span>
  </div>
  <div class="lang-group">
    <span class="lang-btn on" id="lb-ko" onclick="setLang('ko')">KO</span>
    <span class="lang-btn"    id="lb-de" onclick="setLang('de')">DE</span>
    <span class="lang-btn"    id="lb-en" onclick="setLang('en')">EN</span>
  </div>
</nav>

<div id="app"></div>

<footer>
  <span class="f1">Seoul National University × TU Wien · Urban Planning Workshop 2026</span>
  <span class="f1" id="f-right"></span>
</footer>

    ko:[{role:'장기 거주 원주민',desc:'30~40년 이상 거주 고령 가구. 재개발 시 임대주택 배정 대상이나 인근 재정착 가능성 낮음.'},{role:'서울시 / 용산구',desc:'지구단위계획 수립 주체. 2024년 재정비안으로 개발 촉진 기조 전환.'},{role:'민간 시행사 / 조합',desc:'특별계획구역 내 정비사업 추진 주체. 공공기여 협상의 핵심 당사자.'}],
    de:[{role:'Langjährige Bewohner',desc:'Überwiegend ältere Haushalte (30–40+ Jahre). Bei Neubebauung für Sozialwohnungen vorgesehen, lokale Umsiedlung jedoch kaum möglich.'},{role:'Stadt Seoul / Yongsan-gu',desc:'Zuständige Planungsbehörde; mit der Revision 2024 auf Entwicklungsförderung umgeschwenkt.'},{role:'Privatentwickler / Baugenossenschaften',desc:'Umsetzungsträger im Sonderbaugebiet; Schlüsselpartner bei Verhandlungen über öffentliche Beiträge.'}],
    en:[{role:'Long-term residents',desc:'Predominantly elderly households (30–40+ years). Eligible for public rental rehousing, but local resettlement unlikely.'},{role:'Seoul City / Yongsan-gu',desc:'District unit plan authority; shifted to pro-development stance with the 2024 revision.'},{role:'Developers / Associations',desc:'Implementing entities for the special zone; key parties in public contribution negotiations.'}]},

 {id:'spot2',num:2,
  ko:'두텁바위로 — 경사 간선도로',de:'Duteopbawi-ro: Steile Hauptstraße',en:'Duteopbawi-ro: Steep Arterial Road',

  char:{
    ko:'남산에서 용산 방향으로 내려오는 대표 경사 간선도로. 왕복 2~4차로로 차량 통행 우선 설계. 보도 폭이 협소하거나 단절된 구간이 있으며 경사로 인해 보행자·자전거 이용이 사실상 불가능한 구간을 포함한다.',
    de:'Die wichtigste steile Hauptstraße vom Namsan in Richtung Yongsan. Mit 2–4 Fahrspuren auf den Kfz-Verkehr ausgelegt. Gehwege sind stellenweise schmal oder unterbrochen; starkes Gefälle macht Radfahren und Zufußgehen auf einigen Abschnitten praktisch unmöglich.',
    en:'The representative steep arterial road descending from Namsan toward Yongsan. Designed for 2–4 lanes of vehicular priority with narrow or broken sidewalks. Steep gradient makes cycling and pedestrian use practically impossible in some sections.'},
  update:{ko:null,de:null,en:null},
  stats:[{n:'2~4차로',l:{ko:'왕복 차로 수',de:'Fahrspuren',en:'Lanes'}},{n:'Road Diet',l:{ko:'개혁 검토 대상',de:'Reformkandidat',en:'Reform Candidate'}}],
  issues:{

    de:['Fußgänger-Fahrzeug-Konflikt — Erhöhtes Unfallrisiko an Zebrastreifen; viele Querungsstellen ohne Ampel.','Road-Diet-Potenzial — Prüfung von Fahrspurreduzierung und Mikromobilitätsspuren.','Quartierstrennwirkung — Physische Barriere zwischen Huam-dong und Haebangchon.'],
    en:['Pedestrian-vehicle conflict — vehicle speeds increase downhill, raising crosswalk risk; many unsignalized crossings.','Road diet potential — candidate for lane reduction and micro-mobility lanes.','Neighborhood severance — acts as a physical barrier between Huam-dong and Haebangchon.']},
  stakeholders:{
    ko:[{role:'보행 주민 / 고령자',desc:'급경사 구간 낙상 위험 및 대중교통 접근 어려움 호소.'},{role:'배달·택배 근로자',desc:'차량 진입 불가 구간 도보 배달 비중 높음. 경사 이동 노동 강도 문제.'}],
    de:[{role:'Fußgänger / Ältere',desc:'Berichten von Sturzgefahr auf steilen Abschnitten und erschwertem ÖPNV-Zugang.'},{role:'Kurier- und Paketzusteller',desc:'Hoher Anteil an Fußzustellungen in fahrzeugfreien Bereichen; körperliche Belastung durch Steigung.'}],
    en:[{role:'Pedestrians / Elderly',desc:'Report fall risks on steep sections and difficulty accessing public transit.'},{role:'Delivery workers',desc:'High proportion of on-foot deliveries in no-vehicle zones; physical burden from steep gradient.'}]},

 {id:'spot3',num:3,
  ko:'해방촌 신흥시장 & 골목',de:'Haebangchon Sinheung-Markt & Gassen',en:'Haebangchon — Spontaneous Mixed-use Community',
  tags:{ko:['자연발생 혼합용도','역사적 정착지','도시재생','다문화'],de:['Organische Nutzungsmischung','Historische Siedlung','Stadterneuerung','Multikulturalität'],en:['Spontaneous Mixed-use','Historic Settlement','Urban Regeneration','Multicultural']},
  char:{
    ko:'1945년 해방 후 일본군 시설 철거 부지에 피란민·귀환동포가 무허가 정착하며 형성(행정구역: 용산2가동). 2019년 도시재생 뉴딜사업 지정. 전통시장, 루프탑 카페, 다국적 음식점, 게스트하우스가 좁은 골목에 공존하는 자연발생 혼합용도의 전형.',
    de:'Nach 1945 ließen sich Flüchtlinge auf einstigem japanischen Militärgelände nieder (Yongsan 2-ga-dong). 2019 als Stadterneuerungsgebiet ausgewiesen. Traditioneller Markt, Dachterrassenklubs, internationale Restaurants und Gästehäuser teilen enge Gassen — ein Paradebeispiel organischer Nutzungsmischung.',
    en:'Formed after 1945 as refugees settled informally on former Japanese military land (Yongsan 2-ga-dong). Designated Urban Regeneration New Deal area in 2019. Textbook case of spontaneous mixed-use: traditional market, rooftop cafés, multinational restaurants, and guesthouses coexist in narrow alleys.'},
  update:{ko:null,de:null,en:null},
  stats:[{n:'16%',l:{ko:'외국인 거주 비율 (2025)',de:'Ausländeranteil (2025)',en:'Foreign Resident Rate (2025)'}},{n:'2019',l:{ko:'도시재생 뉴딜 지정',de:'New Deal Ausweisung',en:'New Deal Designation'}},{n:'1945',l:{ko:'해방촌 형성 시작',de:'Gründungsjahr',en:'Settlement Origin'}}],
  issues:{
    ko:['임차인 이동 불안정 — 재생사업 이후 임대료 상승. 상업 임차인 젠트리피케이션 압력 지속.','외국인 주민 행정 접근성 — 외국어 서비스 부족. 2025년 영어 소통 프로그램 및 1:1 헬퍼 서비스 신설.','역사경관 보전 vs 재생 — 피란민 정착의 역사성 보전이냐 물리적 정비 우선이냐의 방향 갈등.','야간 소음·쓰레기 — 관광객 증가로 거주 환경 악화.'],
    de:['Mietpreisanstieg und Verdrängung — Steigende Mieten nach der Stadterneuerung; anhaltender Gentrifizierungsdruck.','Behördenzugang für ausländische Bewohner — Unzureichende Mehrsprachigkeit; 2025 eingeführte Englisch-Sprechstunden und 1:1-Helfer.','Denkmalschutz vs. Erneuerung — Konflikt zwischen Erhalt des Flüchtlingscharakters und baulicher Modernisierung.','Nachtlärm und Abfall — Zunehmender Tourismus verschlechtert das Wohnumfeld.'],
    en:['Tenant instability — rent increases post-regeneration; ongoing gentrification pressure on commercial tenants.','Administrative access for foreign residents — insufficient multilingual services; 2025: English programs and 1:1 helper services launched.','Historic preservation vs. renewal — tension between honoring refugee settlement heritage and physical improvement.','Night noise and waste — deteriorating residential environment due to tourism growth.']},
  stakeholders:{
    ko:[{role:'장기 거주 한국인 주민',desc:'노후 주거지 개선 요구. 커뮤니티 유지 및 재생사업 참여 의지 보유.'},{role:'외국인 거주자',desc:'용산2가동 인구의 16%. 생활정보 접근·언어 장벽이 주요 애로사항.'},{role:'상업 임차인',desc:'카페·식당 등 소상공인. 임대료 인상 및 권리금 문제에 취약.'},{role:'관광객',desc:'인스타그램 명소화로 방문객 증가. 거주지와 관광지 갈등 유발.'}],
    de:[{role:'Langjährige koreanische Bewohner',desc:'Wünschen Sanierung; engagiert in Gemeinschaft und Erneuerungsprojekten.'},{role:'Ausländische Bewohner',desc:'16 % der Einwohner; Hauptprobleme: Sprachbarriere und eingeschränkter Behördenzugang.'},{role:'Gewerbliche Mieter',desc:'Kleinbetriebe; anfällig für Mietpreissteigerungen und Goodwill-Konflikte.'},{role:'Touristen',desc:'Durch Instagram-Popularität steigende Besucherzahlen; Nutzungskonflikte mit Wohnfunktion.'}],
    en:[{role:'Long-term Korean residents',desc:'Seek housing improvement; willing to participate in regeneration programs.'},{role:'Expat residents',desc:'16% of Yongsan 2-ga-dong population; main challenges: language barriers and admin access.'},{role:'Commercial tenants',desc:'Small-business operators; vulnerable to rent increases and goodwill disputes.'},{role:'Tourists',desc:'Increasing footfall due to Instagram popularity; conflicts between residential and tourist use.'}]},
  quote:'"Haebangchon is a case of unplanned, spontaneous mixed-use development — traditional market, rooftop cafés, and multicultural residents coexist in a wartime refugee settlement."'},

 {id:'spot5',num:5,

    de:['Verteilung der Erneuerungsgewinne — Kommen Verbesserungen den ursprünglichen Bewohnern zugute oder werden sie durch Mietsteigerungen neutralisiert?','Inklusion ausländischer Bewohner — Wie lassen sich die 16 % ausländischen Einwohner in lokale Governance einbinden?','Nachhaltigkeit nach Projektende — Fähigkeit zur selbsttragenden Gemeinschaftsarbeit nach Auslaufen des New-Deal-Programms.'],
    en:['Distribution of regeneration benefits — whether improvements benefit original residents or are offset by rising rents.','Inclusion of foreign residents — how to incorporate the 16% foreign resident population into local governance.','Post-regeneration sustainability — capacity for self-sustaining community operations after the New Deal period ends.']},

    de:[{role:'Gemeinschaftszentrum Yongsan 2-ga-dong',desc:'Betreibt seit 2025 1:1-Helfer-Programm und englischsprachige Sprechstunden; verteilt mehrsprachige Informationsmaterialien.'},{role:'Selbstverwaltungsorganisationen',desc:'Dorfplanungskommissionen u. Ä.; Bewohnervertretungen mit Einfluss auf Projektrichtung.'}],

 {id:'spot6',num:6,
  ko:'해방촌 ↔ 이태원 전이구역',de:'Übergangszone Haebangchon ↔ Itaewon',en:'Transition Zone — Land Use Shift',
  tags:{ko:['점이적 용도지역제','혼합용도','유기적 토지이용 변화'],de:['Zonierungsübergang','Nutzungsmischung','Organischer Wandel'],en:['Transitional Zoning','Mixed-use','Organic Land Use Change']},
  char:{
    ko:'저층 주거(해방촌)에서 다국적 상업·외국인 거주(이태원)로 전환되는 경계부. 한 블록 사이에서 용도지역 성격, 필지 규모, 가로 성격이 급격히 변화. 자연발생적 용도 전이와 계획적 용도지역제의 차이를 비교 설명하기 최적인 지점.',
    de:'Grenzzone zwischen dem niedriggeschossigen Wohnviertel Haebangchon und dem multinationalen Handels- und Expatriate-Viertel Itaewon. Innerhalb eines Häuserblocks ändern sich Nutzungsart, Parzellenmaßstab und Straßencharakter abrupt — ideal zum Vergleich organischer Nutzungsverschiebung und formeller Zonierung.',
    en:'The boundary zone where low-rise residential (Haebangchon) transitions to multicultural commercial (Itaewon). Within a single block, zoning character, lot scale, and street character shift dramatically. Ideal for comparing spontaneous land-use transition with formal zoning regulations.'},
  update:{ko:null,de:null,en:null},
  stats:[{n:'1블록',l:{ko:'용도·가로 성격 급변 구간',de:'Dramatischer Wandel in 1 Block',en:'Dramatic shift in 1 block'}}],
  issues:{

    de:['Nutzungskonflikt — Nachtlärmbelästigung und Parkprobleme an der Wohn-Gewerbe-Grenze.','Parzellenmaßstab-Dissonanz — Unterschiedliche Bebauungsansätze an der Schnittstelle kleiner Haebangchon-Parzellen und großer Itaewon-Gewerbeflächen.'],
    en:['Mixed-use conflicts — night-time commercial noise and parking issues concentrated at the residential-commercial boundary.','Lot scale mismatch — different development approaches where small Haebangchon lots meet large Itaewon commercial parcels.']},
  stakeholders:{
    ko:[{role:'주거 주민',desc:'상업가로 인접 주거지 소음·안전 문제 호소.'},{role:'상업 임차인',desc:'유동인구 밀집 입지를 활용한 다국적 음식점·상점 운영.'}],
    de:[{role:'Anwohner',desc:'Beschwerden über Lärm und Sicherheitsmängel in der Nähe des Gewerbestreifens.'},{role:'Gewerbliche Mieter',desc:'Betreiben internationale Gastronomie und Läden an Standorten mit hohem Fußgängeraufkommen.'}],
    en:[{role:'Residential inhabitants',desc:'Report noise and safety issues adjacent to the commercial street.'},{role:'Commercial tenants',desc:'Operate multinational restaurants and shops exploiting the high-footfall location.'}]},
  quote:'"Within one block, the urban character shifts from low-rise residential to multicultural commercial — a live example of transitional zoning and organic land-use change."'},

 {id:'spot8',num:8,
  ko:'이태원2동 — 다문화 상업 가로',de:'Itaewon 2-dong — Multikulturelle Handelsstraße',en:'Itaewon 2-dong — Multicultural Commercial Street',
  tags:{ko:['혼합용도','가로 활성화','쇠퇴 후 재활성화'],de:['Nutzungsmischung','Straßenaktivierung','Post-Decline Revitalisierung'],en:['Mixed-use','Street Activation','Post-decline Revitalization']},
  char:{
    ko:'다국적 음식점·상점·외국인 커뮤니티가 밀집한 활성 상업가로. 2022년 이태원 참사 이후 상권이 급격히 위축되었으나 2024~2025년부터 부분적 회복세. 1층 상업-상층 주거의 수직적 혼합용도가 자연발생적으로 형성된 사례.',
    de:'Belebter Gewerbestreifen mit internationaler Gastronomie, Einzelhandel und Expat-Gemeinschaften. Nach dem Unglück von 2022 brach das Geschäftsleben stark ein; seit 2024–25 partielle Erholung. Beispiel für organisch entstandene vertikale Nutzungsmischung: Erdgeschoss Gewerbe, Obergeschosse Wohnen.',
    en:'A multinational commercial strip of restaurants, shops, and expat communities. Following the 2022 Itaewon crowd crush, commercial activity contracted sharply; partial recovery emerging from 2024–2025. A case of organically formed vertical mixed-use: ground-floor commercial with residential above.'},
  update:{ko:null,de:null,en:null},
  stats:[{n:'2022',l:{ko:'이태원 참사 (상권 급위축)',de:'Massenpanik (Geschäftseinbruch)',en:'Crowd Crush (commercial contraction)'}},{n:'회복 중',l:{ko:'2024~2025 부분 회복',de:'Teilweise Erholung 2024–25',en:'Partial Recovery 2024–25'}}],
  issues:{
    ko:['2022년 이태원 참사 이후 상권 위축 — 방문객 급감, 공실 증가. 회복세는 2024~2025년부터.','공공 공간 안전 관리 — 협소 가로에 집중되는 인파 관리. 안전 계획 및 공간 재설계 논의.','상권 재활성화 방향 — 기존 다문화 정체성 유지냐, 새로운 상권 유치냐.'],
    de:['Geschäftsrückgang nach 2022 — Starker Besucherrückgang und steigende Leerstandsquoten; partielle Erholung ab 2024–25.','Öffentliche Raumsicherheit — Besucherlenkung auf engen Straßen; Debatten über Sicherheitskonzepte und Umgestaltung.','Revitalisierungsrichtung — Beibehaltung des multikulturellen Charakters oder Ansiedlung neuer Gewerbetypologien?'],

/* ── HELPERS ── */
function tl(o){ if(!o) return ''; return o[LANG] || o.en || ''; }
function etag(type){
  const labels={intro:'intro',field:'field',work:'work',pres:'final',free:'free'};
  if(!type||type==='break') return '';
  return `<span class="etag etag-${type}">${labels[type]||type}</span>`;
}

/* ── RENDER FUNCTIONS ── */
function renderHome(){
  const labels={ko:{label:'대상지 소개 · Field Survey Route',h1:'대상지',desc:'후암동 경사 주거지에서 출발해 해방촌·이태원을 거쳐 소월로까지 이어지는 설계 대상지. 구릉지 도시조직, 자연발생 혼합용도, 역사적 재생, 녹지 단절 문제를 한 루트에서 관찰합니다.',map:'대상지 계획도 — 핀을 클릭하면 Spot 설명으로 이동',spotttl:'설계 Spot 개요',s1:'외국인 거주 비율 (2025)',s2:'특별계획구역 대상 면적',s3:'허용 최고 높이',s4:'해방촌 형성 시작',s5:'설계 Spots · 도보 70분'},de:{label:'Entwurfsgebiet · Planungsgebiet',h1:'Entwurfsgebiet',desc:'Das Entwurfsgebiet erstreckt sich vom Hanglage-Wohnviertel Huam-dong über Haebangchon und Itaewon bis zur Sowol-ro. Es bietet Einblick in Hangbebauung, organisch gewachsene Nutzungsmischung, historische Stadterneuerung und Grünraumtrennung.',map:'Plangebietskarte — Auf einen Pin klicken für Details',spotttl:'Entwurfs-Spots Übersicht',s1:'Ausländeranteil (2025)',s2:'Sonderbaugebiet',s3:'Max. Gebäudehöhe',s4:'Entstehung Haebangchon',s5:'Entwurfs-Spots · ca. 70 Min.'},en:{label:'Design Site · Field Survey Route',h1:'Design Site',desc:'The design site extends from the hillside residential area of Huam-dong through Haebangchon and Itaewon to Sowol-ro. Observe hillside urban fabric, spontaneous mixed-use, historic regeneration, and green space disconnection.',map:'Site Plan — Click a pin to view spot details',spotttl:'Design Spot Overview',s1:'Foreign Resident Rate (2025)',s2:'Special Planning Zone',s3:'Max Height Permitted',s4:'Haebangchon Settlement Origin',s5:'Design Spots · ~70 min walk'}};
  const L=labels[LANG];
  const dots=MDOTS.map(d=>`<div class="map-dot" style="left:${d.x}%;top:${d.y}%;" onclick="go('spot${d.n}')"><span>${d.n}</span><div class="tip">Spot ${d.n} · ${tl(d)}</div></div>`).join('');
  const cards=SPOTS.map(s=>`<div class="scard" onclick="go('${s.id}')"><div class="scard-num">Spot ${s.num}</div><div class="scard-main">${tl(s)}</div><div class="scard-sub">${LANG==='ko'?s.en:s.ko}</div><div class="scard-tags">${s.tags[LANG].slice(0,3).map(t=>`<span class="stag">${t}</span>`).join('')}<span class="scard-arr" style="margin-left:auto">→</span></div></div>`).join('');
  return `<section class="hero"><div class="hero-label">${L.label}</div><h1>${L.h1}</h1><p class="hero-desc">${L.desc}</p></section>
  <div class="stats-row"><div class="stat-cell"><div class="sn">16%</div><div class="sl">${L.s1}</div></div><div class="stat-cell"><div class="sn">32만㎡</div><div class="sl">${L.s2}</div></div><div class="stat-cell"><div class="sn">100m</div><div class="sl">${L.s3}</div></div><div class="stat-cell"><div class="sn">1945</div><div class="sl">${L.s4}</div></div><div class="stat-cell"><div class="sn">7</div><div class="sl">${L.s5}</div></div></div>
  <div class="map-section"><div class="map-label">${L.map}</div><div class="map-wrap"><img src="${MURI}" alt="대상지 계획도">${dots}</div></div>
  <div class="spots-section" style="padding-top:0;"><div class="sec-title">${L.spotttl}</div><div class="spots-grid">${cards}</div></div>`;
}

function renderSite(){
  const L={ko:{label:'설계 대상지',h1:'대상지',desc:'총 7개 설계 Spot · 후암동 → 해방촌 → 이태원 → 소월로 · 도보 약 70분'},de:{label:'Entwurfsgebiet',h1:'Entwurfsgebiet',desc:'7 Entwurfs-Spots · Huam-dong → Haebangchon → Itaewon → Sowol-ro · ca. 70 Min.'},en:{label:'Design Site',h1:'Design Site',desc:'7 Design Spots · Huam-dong → Haebangchon → Itaewon → Sowol-ro · ~70 min walk'}}[LANG];

function renderSpot(s){
  const prev=SPOTS[SPOTS.indexOf(s)-1]||null, next=SPOTS[SPOTS.indexOf(s)+1]||null;
  const is=s.issues[LANG]||s.issues.en;
  const shs=s.stakeholders[LANG]||s.stakeholders.en;
  const char=s.char[LANG]||s.char.en;
  const upd=s.update[LANG];
  const tags=s.tags[LANG];
  const SD={ko:{char:'공간 특징',upd:'최근 계획 현황',iss:'도시 문제',sh:'이해관계자',act:'주체',role:'역할 및 현황',all:'전체 목록'},de:{char:'Räumliche Charakteristik',upd:'Aktueller Planungsstand',iss:'Stadtplanerische Probleme',sh:'Akteure',act:'Akteur',role:'Rolle & Status',all:'Alle Spots'},en:{char:'Spatial Character',upd:'Planning Update',iss:'Urban Issues',sh:'Stakeholders',act:'Actor',role:'Role & Status',all:'All Spots'}}[LANG];
  const statsHtml=s.stats.length?`<div class="stat-boxes">${s.stats.map(st=>`<div class="sbox"><div class="sb-n">${st.n}</div><div class="sb-l">${tl(st.l)}</div></div>`).join('')}</div>`:'';
  const crumbSite={ko:'대상지',de:'Entwurfsgebiet',en:'Design Site'}[LANG];
  return `<div style="border-bottom:2px solid #000;"><div class="spot-top"><div class="spot-top-inner"><div class="spot-badge">${s.num}</div><div class="spot-main">${tl(s)}</div><div class="spot-sub">${LANG==='ko'?s.en:(LANG==='de'?s.en:s.ko)}</div><div class="tag-row">${tags.map(t=>`<span class="spot-tag">${t}</span>`).join('')}</div></div></div></div>
  <div class="spot-wrap"><div class="crumb"><span onclick="go('home')">Home</span><span class="crumb-sep"> / </span><span onclick="go('site')">${crumbSite}</span><span class="crumb-sep"> / </span><span>Spot ${s.num}</span></div>
  ${statsHtml}
  <div class="two-col">
    <div class="cbox"><div class="clabel">${SD.char}</div><p class="btext">${char}</p>${upd?`<div class="clabel" style="margin-top:14px">${SD.upd}</div><p class="btext">${upd}</p>`:''}<div class="quote">${s.quote}</div></div>
    <div class="cbox"><div class="clabel">${SD.iss}</div><ul class="ilist">${is.map(i=>`<li class="iitem"><div class="idot"></div><div>${i}</div></li>`).join('')}</ul></div>
  </div>
  <div class="cbox-full"><div class="clabel">${SD.sh}</div><table class="shtable"><thead><tr><th>${SD.act}</th><th>${SD.role}</th></tr></thead><tbody>${shs.map(sh=>`<tr><td><span class="sh-role">${sh.role}</span></td><td>${sh.desc}</td></tr>`).join('')}</tbody></table></div>
  <div class="spot-nav">
    <button class="snbtn ${!prev?'dim':''}" onclick="${prev?`go('${prev.id}')`:''}"">← ${prev?`Spot ${prev.num} · ${tl(prev)}`:''}</button>
    <span class="sncenter" onclick="go('site')">${SD.all}</span>
    <button class="snbtn ${!next?'dim':''}" onclick="${next?`go('${next.id}')`:''}"" >${next?`Spot ${next.num} · ${tl(next)}`:''} →</button>
  </div></div>`;
}

function renderGloss(){
  const L={ko:{label:'용어집',h1:'도시설계·교통\n핵심 용어집',intro:'총 37개 용어 · 한국어 / 독일어 / 영어 3개 언어 정리',cko:'한국어',cnote:'설명'},de:{label:'Glossar',h1:'Städtebau &\nVerkehrsplanung Glossar',intro:'37 Begriffe · Koreanisch / Deutsch / Englisch',cko:'Koreanisch',cnote:'Erläuterung'},en:{label:'Glossary',h1:'Urban Design &\nPlanning Glossary',intro:'37 terms · Korean / German / English',cko:'Korean',cnote:'Note'}}[LANG];
  const rows=GLOSS.map(cat=>`<tr class="cat-row"><td colspan="4">${tl(cat.cat)}</td></tr>${cat.terms.map(term=>`<tr><td><span class="g-ko">${term.ko}</span></td><td><span class="g-de">${term.de}</span></td><td><span class="g-en">${term.en}</span></td><td><span class="g-note">${tl(term.note)}</span></td></tr>`).join('')}`).join('');
  return `<div class="dark-hero"><div class="hero-label">${L.label}</div><h1 style="white-space:pre-line">${L.h1}</h1></div><div class="gloss-wrap"><p class="gloss-intro">${L.intro}</p><table class="gtable"><thead><tr><th style="width:18%">${L.cko}</th><th style="width:26%">Deutsch</th><th style="width:22%">English</th><th>${L.cnote}</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function renderSched(){
  const SL={ko:{label:'SNU × TU Wien — April 2026',h1:'전체 일정',sub:'4/2–5 서울 도시답사 → 4/7–10 SNU×TUW 공동 워크샵',btn1:'답사 및 전체 워크샵 일정',btn2:'워크샵 상세 일정',ph1:'서울 도시답사',ph2:'SNU × TUW 워크샵'},de:{label:'SNU × TU Wien — April 2026',h1:'Vollständiges Programm',sub:'2.–5.4. Seoul Stadtexkursion → 7.–10.4. SNU×TUW gemeinsamer Workshop',btn1:'Exkursion + Gesamtprogramm',btn2:'Workshop-Details',ph1:'Seoul Stadtexkursion',ph2:'SNU × TUW Workshop'},en:{label:'SNU × TU Wien — April 2026',h1:'Full Schedule',sub:'4/2–5 Seoul field trips → 4/7–10 SNU×TUW joint workshop',btn1:'Field trips + full schedule',btn2:'Workshop detailed schedule',ph1:'Seoul field trips',ph2:'SNU × TUW Workshop'}}[LANG];

  const mkPhase=(label,pill,rows)=>`<div class="sv-phase"><div class="sv-phase-label"><span class="sv-pill">${pill}</span>${label}</div>${rows.map(row=>`<div class="sv-row"><div class="sv-day"><div class="sv-d">${row.d}</div><div class="sv-w">${tl(row.w)}</div></div><div class="sv-body">${row.items.map(item=>`<div class="sv-line"><div class="sv-t">${item.t}</div><div class="sv-c">${etag(item.type)}${tl(item)}${item.route?`<div class="sv-route">${item.route}</div>`:''}</div></div>`).join('')}</div></div>`).join('')}</div>`;

  const mkDetail=()=>SCHED_DETAIL.map(day=>`<div class="dv-day"><div class="dv-head"><span class="dv-date">${tl(day.d)}</span><span class="dv-room">${day.room}</span><span class="dv-phase-tag">${tl(day.phase)}</span></div>${day.blocks.map(b=>`<div class="dv-block${b.type==='break'?' dv-break':''}"><div class="dv-time">${typeof b.t==='object'?tl(b.t):b.t}</div><div class="dv-info"><div class="dv-name">${b.type!=='break'?etag(b.type):''}${tl(b)}</div></div></div>`).join('')}</div>`).join('');

  return `<div class="dark-hero"><div class="hero-label">${SL.label}</div><h1>${SL.h1}</h1><p style="font-size:13px;color:rgba(255,255,255,.45);font-weight:300;margin-top:10px;">${SL.sub}</p></div>
  <div class="sch-content">
    <div class="view-toggle">
      <button class="view-btn on" id="sv-btn" onclick="schView('simple')">${SL.btn1}</button>
      <button class="view-btn" id="dv-btn" onclick="schView('detail')">${SL.btn2}</button>
    </div>
    <div id="sv-content">
      ${mkPhase(SL.ph1,'Phase 1',SCHED_P1)}
      ${mkPhase(SL.ph2,'Phase 2',SCHED_P2)}
    </div>
    <div id="dv-content" class="dv-wrap">${mkDetail()}</div>
  </div>`;
}

function schView(v){
  document.getElementById('sv-content').style.display=v==='simple'?'block':'none';
  document.getElementById('dv-content').style.display=v==='detail'?'block':'none';
  document.getElementById('sv-btn').classList.toggle('on',v==='simple');
  document.getElementById('dv-btn').classList.toggle('on',v==='detail');
}

/* ── ROUTER ── */
function go(id){ location.hash=id; }

function updateNav(){
  ['home','site','gloss','sched'].forEach(k=>{
    const el=document.getElementById('nl-'+k);
    if(el) el.textContent=NAV[k][LANG]||NAV[k].en;
  });
  document.getElementById('f-right').textContent=FOOTER[LANG]||FOOTER.en;
}

function setLang(l){
  LANG=l;
  ['ko','de','en'].forEach(x=>document.getElementById('lb-'+x).classList.toggle('on',x===l));
  document.documentElement.lang=l;
  localStorage.setItem('snu-tuw-lang',l);
  updateNav();
  render();
}

function render(){
  const hash=location.hash.replace('#','')||'home';
  const spot=SPOTS.find(s=>s.id===hash);
  let html='';
  if(hash==='home') html=renderHome();
  else if(hash==='site') html=renderSite();
  else if(hash==='gloss') html=renderGloss();
  else if(hash==='sched') html=renderSched();
  else if(spot) html=renderSpot(spot);
  else html=renderHome();
  document.getElementById('app').innerHTML=html;
  window.scrollTo(0,0);
  ['home','site','gloss','sched'].forEach(id=>{
    const el=document.getElementById('nl-'+id);
    if(el) el.classList.toggle('on', hash===id||(id==='site'&&!!spot));
  });
}

window.addEventListener('hashchange',render);
const savedLang=localStorage.getItem('snu-tuw-lang')||'ko';
setLang(savedLang);
</script>
