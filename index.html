<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vienna Workshop 2026 · 남산 일대</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAFAF8;--white:#FFFFFF;--ink:#1A1916;--ink2:#4A4845;--ink3:#9A9895;--rule:#E8E5E0;
  --c1:#B5704A;--c2:#5B7FA6;--c3:#7A9E7E;--c4:#A07EB8;--c5:#7EB8A0;
  --c6:#C87E8A;--c7:#8A7EB8;--c8:#B8A07E;--c9:#5B9E8A;--c10:#C85A5A;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--ink);font-family:'Noto Sans KR',sans-serif;font-weight:300;font-size:14px;line-height:1.7;}

/* NAV */
nav{background:var(--white);border-bottom:1px solid var(--rule);position:sticky;top:0;z-index:200;height:52px;display:flex;align-items:center;padding:0 40px;justify-content:space-between;}
.logo{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;color:var(--ink2);text-transform:uppercase;cursor:pointer;}
.nav-links{display:flex;align-items:center;gap:2px;}
.nl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;padding:5px 12px;border-radius:4px;cursor:pointer;color:var(--ink3);transition:all .15s;text-transform:uppercase;}
.nl:hover{background:var(--bg);color:var(--ink2);}
.nl.on{background:var(--ink);color:#fff;}
.nav-badge{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;color:var(--ink3);border:1px solid var(--rule);padding:3px 10px;border-radius:20px;}

/* PAGE */
.page{display:none;animation:fadeUp .3s ease both;}
.page.on{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* HERO */
.hero{background:var(--white);border-bottom:1px solid var(--rule);padding:56px 40px 44px;}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;}
.hero h1{font-family:'DM Serif Display',serif;font-size:clamp(32px,5vw,54px);font-weight:400;line-height:1.1;margin-bottom:12px;}
.hero h1 em{font-style:italic;color:var(--ink3);}
.hero-desc{font-size:13.5px;line-height:1.85;color:var(--ink2);max-width:560px;margin-bottom:24px;}

/* STATS */
.stats-row{display:flex;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);background:var(--white);flex-wrap:wrap;}
.stat-cell{flex:1;min-width:140px;padding:18px 24px;border-right:1px solid var(--rule);}
.stat-cell:last-child{border-right:none;}
.sn{font-family:'DM Serif Display',serif;font-size:24px;color:var(--ink);margin-bottom:2px;}
.sl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);}

/* MAP SECTION */
.map-section{padding:0 40px 48px;max-width:1000px;margin:0 auto;}
.map-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);padding:28px 0 12px;}
.map-wrap{position:relative;display:inline-block;width:100%;max-width:520px;}
.map-wrap img{width:100%;display:block;border-radius:8px;border:1px solid var(--rule);box-shadow:0 2px 20px rgba(0,0,0,.06);}
.map-dot{position:absolute;transform:translate(-50%,-50%);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 2px 8px rgba(0,0,0,.3);border:2px solid rgba(255,255,255,.8);}
.map-dot:hover{transform:translate(-50%,-50%) scale(1.25);box-shadow:0 4px 16px rgba(0,0,0,.4);}
.map-dot .dot-label{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:10px;font-weight:400;white-space:nowrap;padding:3px 8px;border-radius:4px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:10;}
.map-dot:hover .dot-label{opacity:1;}

/* SPOT GRID */
.spots-section{max-width:1000px;margin:0 auto;padding:0 40px 80px;}
.sec-title{font-family:'DM Serif Display',serif;font-size:26px;color:var(--ink);margin-bottom:24px;}
.spots-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.scard{background:var(--white);border:1px solid var(--rule);border-radius:8px;padding:18px 20px;cursor:pointer;transition:box-shadow .2s,transform .15s;position:relative;overflow:hidden;}
.scard::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;}
.scard:hover{box-shadow:0 4px 20px rgba(0,0,0,.08);transform:translateY(-1px);}
.scard-num{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.scard-ko{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:2px;}
.scard-en{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.04em;color:var(--ink3);margin-bottom:10px;}
.scard-tags{display:flex;flex-wrap:wrap;gap:4px;}
.stag{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.05em;padding:2px 7px;border-radius:3px;background:var(--bg);color:var(--ink3);border:1px solid var(--rule);}

/* SPOT DETAIL */
.spot-header{padding:40px 40px 28px;background:var(--white);border-bottom:1px solid var(--rule);max-width:1000px;margin:0 auto;}
.spot-num-badge{display:inline-flex;width:44px;height:44px;border-radius:50%;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:20px;color:#fff;margin-bottom:14px;}
.spot-title-ko{font-family:'DM Serif Display',serif;font-size:clamp(24px,4vw,40px);color:var(--ink);margin-bottom:4px;}
.spot-title-en{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;color:var(--ink3);margin-bottom:16px;}
.spot-tag-row{display:flex;flex-wrap:wrap;gap:6px;}
.spot-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.06em;padding:3px 10px;border-radius:20px;background:var(--bg);color:var(--ink3);border:1px solid var(--rule);}

.spot-wrap{max-width:1000px;margin:0 auto;padding:32px 40px 80px;}

.breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:28px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;color:var(--ink3);}
.breadcrumb span{cursor:pointer;}
.breadcrumb span:hover{color:var(--ink);}
.bc-sep{color:var(--rule);}

.stat-boxes{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;}
.stat-box{background:var(--white);border:1px solid var(--rule);border-radius:6px;padding:12px 18px;flex:1;min-width:110px;}
.sb-n{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:2px;}
.sb-l{font-size:11px;color:var(--ink3);line-height:1.4;}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.col-box{background:var(--white);border:1px solid var(--rule);border-radius:8px;padding:22px 24px;}
.col-box-full{background:var(--white);border:1px solid var(--rule);border-radius:8px;padding:22px 24px;margin-bottom:16px;}
.col-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);padding-bottom:10px;border-bottom:1px solid var(--rule);margin-bottom:14px;}

.body-text{font-size:13px;line-height:1.9;color:var(--ink2);}
.body-text+.body-text{margin-top:10px;}

.issue-list{list-style:none;display:flex;flex-direction:column;gap:10px;}
.issue-item{display:flex;gap:10px;font-size:12.5px;color:var(--ink2);line-height:1.65;}
.idot{width:6px;height:6px;border-radius:50%;margin-top:7px;flex-shrink:0;}
.issue-en{font-size:11px;color:var(--ink3);margin-top:2px;line-height:1.5;}

.sh-table{width:100%;border-collapse:collapse;}
.sh-table th{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);text-align:left;padding:8px 12px;border-bottom:1px solid var(--rule);background:var(--bg);}
.sh-table td{padding:10px 12px;border-bottom:1px solid var(--rule);font-size:12.5px;color:var(--ink2);line-height:1.6;vertical-align:top;}
.sh-table tr:last-child td{border-bottom:none;}
.sh-role{font-weight:700;color:var(--ink);font-size:12px;display:block;margin-bottom:2px;}

.eng-quote{font-family:'DM Serif Display',serif;font-style:italic;font-size:13px;line-height:1.75;color:var(--ink3);padding:14px 18px;border-left:3px solid var(--rule);background:var(--bg);border-radius:0 6px 6px 0;margin-top:16px;}

.spot-nav{display:flex;justify-content:space-between;margin-top:36px;padding-top:20px;border-top:1px solid var(--rule);gap:10px;}
.snav-btn{display:flex;align-items:center;gap:8px;padding:10px 18px;border:1px solid var(--rule);border-radius:6px;cursor:pointer;background:var(--white);font-size:12px;color:var(--ink2);transition:all .15s;font-family:'Noto Sans KR',sans-serif;}
.snav-btn:hover{background:var(--bg);border-color:var(--ink3);}
.snav-btn.dim{opacity:.3;pointer-events:none;}
.snav-center{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:10px 18px;border:1px solid var(--rule);border-radius:6px;cursor:pointer;background:var(--bg);color:var(--ink2);transition:all .15s;}
.snav-center:hover{border-color:var(--ink3);}

/* GLOSSARY */
.gloss-header{background:var(--ink);padding:48px 40px 36px;}
.gloss-header h1{font-family:'DM Serif Display',serif;font-size:clamp(26px,4vw,40px);color:#E8E4DC;margin-bottom:4px;}
.gloss-header h1 em{font-style:italic;color:#555;}
.gloss-sub{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;color:#555;text-transform:uppercase;}

.gloss-wrap{max-width:1000px;margin:0 auto;padding:40px 40px 80px;}
.gloss-intro{font-size:13px;color:var(--ink3);margin-bottom:32px;}

.gloss-table{width:100%;border-collapse:collapse;margin-bottom:0;}
.gloss-table th{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);text-align:left;padding:8px 16px;border-bottom:2px solid var(--rule);background:var(--bg);}
.gloss-table td{padding:10px 16px;border-bottom:1px solid var(--rule);font-size:13px;line-height:1.55;vertical-align:top;}
.gloss-table tr:hover td{background:var(--rule);}
.gloss-ko{font-weight:700;color:var(--ink);}
.gloss-en{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.04em;}
.gloss-note{color:var(--ink3);font-size:12px;}
.cat-row td{background:#1A1918!important;color:#C8A96E;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;padding:8px 16px;border-bottom:none;}

/* FOOTER */
footer{border-top:1px solid var(--rule);background:var(--white);padding:18px 40px;display:flex;justify-content:space-between;align-items:center;}
footer .f1{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;color:var(--ink3);text-transform:uppercase;}
footer .f2{font-family:'DM Serif Display',serif;font-style:italic;font-size:13px;color:var(--ink3);}

@media(max-width:720px){
  nav{padding:0 20px;}
  .hero,.map-section,.spots-section,.spot-header,.spot-wrap,.gloss-wrap,.gloss-header,footer{padding-left:20px;padding-right:20px;}
  .spots-grid,.two-col{grid-template-columns:1fr;}
  .stat-cell{flex:0 0 50%;}
  .nav-links{display:none;}
  footer{flex-direction:column;gap:6px;text-align:center;}
}
</style>
</head>
<body>

<nav>
  <span class="logo" onclick="go('home')">Vienna Workshop 2026</span>
  <div class="nav-links">
    <span class="nl" id="nl-home" onclick="go('home')">Home</span>
    <span class="nl" id="nl-part1" onclick="go('part1')">현장 루트</span>
    <span class="nl" id="nl-part2" onclick="go('part2')">용어집</span>
  </div>
  <span class="nav-badge">Seoul · Namsan</span>
</nav>

<div id="app"></div>

<footer>
  <span class="f1">SNU · TUW · Urban Planning Seminar 2026</span>
  <span class="f2">Vienna Workshop — Namsan Site Analysis</span>
</footer>

<script>
const HEX=['#B5704A','#5B7FA6','#7A9E7E','#A07EB8','#7EB8A0','#C87E8A','#8A7EB8','#B8A07E','#5B9E8A','#C85A5A'];

// Spot positions on the map image (as % of image width/height)
// Based on the naver map screenshot
const MAP_DOTS=[
  {n:1,  label:'후암동 경사 주거지',   x:20, y:27},
  {n:2,  label:'두텁바위로',            x:19, y:42},
  {n:3,  label:'해방촌 신흥시장',       x:29, y:56},
  {n:4,  label:'루프탑 뷰포인트',       x:38, y:48},
  {n:5,  label:'용산2가동 주민센터',    x:36, y:54},
  {n:6,  label:'해방촌↔이태원 전이',   x:44, y:57},
  {n:7,  label:'보성여자고등학교',      x:27, y:61},
  {n:8,  label:'이태원2동',             x:49, y:60},
  {n:9,  label:'소월로',               x:62, y:63},
  {n:10, label:'그랜드하얏트',          x:73, y:62},
];

const SPOTS=[
  {id:'spot1',num:1,color:HEX[0],
   ko:'후암동 경사 주거지',en:'Huam-dong Hillside Residential Area',
   tags:['Urban Morphology','Hillside Development','Lot Pattern','Redevelopment'],
   char_ko:'남산 북사면에 형성된 저층 경사 주거지. 평균 경사 15~25도의 구릉지에 불규칙한 소규모 필지와 막다른 골목이 얽혀 있으며 차량 접근이 극도로 제한된다. 일제강점기 삼판통(三坂通) 일본인 고급 주택단지로 개발되었다가 해방 후 피란민 등이 정착하며 현재의 저층 고밀 조직으로 변화하였다.',
   char_en:'A low-rise hillside residential area on the northern slope of Namsan. Irregular small-scale lots and dead-end alleys on a slope averaging 15–25°, with extremely limited vehicle access. Originally an upscale Japanese residential district during the colonial period, subsequently settled by refugees, transforming into the current dense low-rise fabric.',
   update:'2024년 9월 서울시 도시·건축공동위원회에서 후암동 특별계획구역 재정비안 수정가결. 32만 1,281㎡에 최고 100m(주거 33층) 개발 허용. 한강대로 인접 구역을 준주거지역으로 상향, 폭 20m 공공 보행통로 및 남산-용산공원 녹지축 연결 계획 포함.',
   stats:[{n:'32만㎡',l:'특별계획구역 대상'},{n:'100m',l:'허용 최고 높이'},{n:'2024',l:'지구단위계획 수정가결'}],
   issues:[
     {ko:'보행 접근성 단절 — 급경사로 고령자·장애인 이동 불가 구간 다수. 계단만 있는 필지 접근로 존재.',en:'Pedestrian access severed — many sections impassable for elderly/disabled. Some lots accessible only via stairways.'},
     {ko:'기반시설 노후화 — 상하수도·전기 매설 40년 이상, 소방차 진입 불가 골목 비율 높음.',en:'Aging infrastructure — 40+ year-old utility lines; high proportion of alleys inaccessible to fire trucks.'},
     {ko:'개발 압력 vs 원주민 이주 — 특별계획구역 지정으로 지가 상승. 장기 거주 고령 가구 재정착 가능성 불투명.',en:'Development pressure vs. displacement — land values rising post-designation; uncertain resettlement for long-term elderly households.'},
     {ko:'공공기여 설계 — 보행통로·공원 기부채납의 실효성. 녹지축 연결 실현 가능성.',en:'Design of public contribution — effectiveness of pedestrian corridor dedications; feasibility of realizing the green axis.'},
   ],
   stakeholders:[
     {role:'장기 거주 원주민 (Long-term residents)',desc:'30~40년 이상 거주 고령 가구 다수. 재개발 시 임대주택 배정 대상이나 인근 재정착 가능성 낮음.'},
     {role:'서울시 / 용산구',desc:'지구단위계획 수립 주체. 2024년 재정비안으로 개발 촉진 기조로 전환.'},
     {role:'민간 시행사 / 조합',desc:'특별계획구역 내 정비사업 추진 주체. 공공기여 협상의 핵심 당사자.'},
   ],
   quote:'"Organically grown hillside residential fabric — irregular lot pattern, poor accessibility, and aging infrastructure make this a textbook case for urban morphology analysis."'},
  {id:'spot2',num:2,color:HEX[1],
   ko:'두텁바위로 — 경사 간선도로',en:'Duteopbawi-ro: Steep Arterial Road',
   tags:['Road Diet','Street Hierarchy','Pedestrian Safety','Last Mile'],
   char_ko:'남산에서 용산 방향으로 내려오는 대표 경사 간선도로. 왕복 2~4차로로 차량 통행 우선 설계. 보도 폭이 협소하거나 단절된 구간이 있으며 경사로 인해 보행자·자전거 이용이 사실상 불가능한 구간을 포함한다.',
   char_en:'The representative steep arterial road descending from Namsan toward Yongsan. Designed for 2–4 lanes of vehicular priority with narrow or broken sidewalks. Steep gradient makes cycling and pedestrian use practically impossible in some sections.',
   stats:[{n:'2~4차로',l:'왕복 차로 수'},{n:'Road Diet',l:'적용 검토 대상'}],
   issues:[
     {ko:'보행-차량 갈등 — 경사 구간 차량 속도 증가로 횡단보도 사고 위험. 신호 없는 횡단지점 다수.',en:'Pedestrian-vehicle conflict — vehicle speeds increase downhill, raising crosswalk risks. Many unsignalized crossings.'},
     {ko:'Road Diet 가능성 — 차로 수 축소 및 PM 전용 구간 설치 검토 대상. 경사로 인한 자전거 이용 한계.',en:'Road diet potential — candidate for lane reduction and micro-mobility lanes, though steep gradient limits cycling.'},
     {ko:'생활권 단절 — 후암동-해방촌 사이의 물리적 장벽 역할. 보행 연속성 미확보.',en:'Neighborhood severance — acts as a physical barrier between Huam-dong and Haebangchon.'},
   ],
   stakeholders:[
     {role:'보행 주민 / 고령자',desc:'급경사 구간 낙상 위험 및 대중교통 접근 어려움 호소.'},
     {role:'배달·택배 근로자',desc:'차량 진입 불가 구간 도보 배달 비중 높음. 경사 이동 노동 강도 문제.'},
   ],
   quote:'"A steep arterial road designed for vehicles — a prime candidate for road diet and pedestrianization discussion."'},
  {id:'spot3',num:3,color:HEX[2],
   ko:'해방촌 신흥시장 & 골목',en:'Haebangchon — Spontaneous Mixed-use Community',
   tags:['Spontaneous Mixed-use','Historic Settlement','Urban Regeneration','Multicultural'],
   char_ko:'1945년 해방 후 일본군 시설 철거 부지와 남산 기슭에 피란민·귀환동포가 무허가 정착하며 형성. 행정구역상 용산2가동. 2019년 도시재생 뉴딜사업(일반근린형) 지정. 전통시장(신흥시장), 루프탑 카페, 다국적 음식점, 소규모 게스트하우스가 좁은 골목에 공존하는 자연발생 혼합용도의 전형.',

function renderHome(){
  return `
  <section class="hero">
    <div class="hero-eyebrow">Field Survey Route · 현장 답사 루트</div>

    <p class="hero-desc">후암동 경사 주거지에서 출발해 해방촌·이태원을 거쳐 소월로까지. 구릉지 도시조직, 자연발생 혼합용도, 역사적 재생, 녹지 단절, 대형 개발의 공공성 문제를 한 루트에서 관찰합니다.</p>

    <div class="stat-cell"><div class="sn">32만㎡</div><div class="sl">후암동 재정비 대상 면적</div></div>

      <div class="map-dot" style="background:${HEX[d.n-1]};left:${d.x}%;top:${d.y}%;"

        <div class="scard-ko">${s.ko}</div>
        <div class="scard-en">${s.en}</div>
        <div class="scard-tags">${s.tags.slice(0,3).map(t=>`<span class="stag">${t}</span>`).join('')}
        <span style="float:right;font-size:12px;color:var(--ink3);margin-top:-2px;">→</span></div>
      </div>`).join('')}
    </div>
  </div>`;
}

function renderPart1(){
  return `
  <section class="hero">
    <div class="hero-eyebrow">Part 1 · 현장 답사 루트</div>
    <h1>Field Survey<br><em>Route</em></h1>
    <p class="hero-desc">총 10개 Spot · 후암동 → 해방촌 → 이태원 → 소월로 → 그랜드하얏트 · 도보 약 90분</p>
  </section>
  <div class="spots-section" style="padding-top:32px;">
    <div class="spots-grid">
      ${SPOTS.map(s=>`
      <div class="scard" onclick="go('${s.id}')">
        <div style="position:absolute;top:0;left:0;width:3px;height:100%;background:${s.color};border-radius:8px 0 0 8px;"></div>
        <div class="scard-num" style="color:${s.color}">Spot ${s.num}</div>
        <div class="scard-ko">${s.ko}</div>
        <div class="scard-en">${s.en}</div>
        <div class="scard-tags">${s.tags.map(t=>`<span class="stag">${t}</span>`).join('')}
        <span style="float:right;font-size:12px;color:var(--ink3);">→</span></div>
      </div>`).join('')}
    </div>
  </div>`;
}

function renderSpot(s){
  const prev=SPOTS[s.num-2]||null, next=SPOTS[s.num]||null;
  return `
  <div style="background:var(--white);border-bottom:1px solid var(--rule);">
  <div class="spot-header">
    <div class="spot-num-badge" style="background:${s.color}">${s.num}</div>
    <div class="spot-title-ko">${s.ko}</div>
    <div class="spot-title-en">${s.en}</div>
    <div class="spot-tag-row">${s.tags.map(t=>`<span class="spot-tag">${t}</span>`).join('')}</div>
  </div>
  </div>
  <div class="spot-wrap">
    <div class="breadcrumb">
      <span onclick="go('home')">Home</span><span class="bc-sep">/</span>
      <span onclick="go('part1')">현장 루트</span><span class="bc-sep">/</span>
      <span style="color:${s.color}">Spot ${s.num}</span>
    </div>

    ${s.stats&&s.stats.length?`<div class="stat-boxes">${s.stats.map(st=>`
    <div class="stat-box"><div class="sb-n" style="color:${s.color}">${st.n}</div><div class="sb-l">${st.l}</div></div>`).join('')}</div>`:''}

    <div class="two-col">
      <div class="col-box">
        <div class="col-label">공간 특징 · Spatial Character</div>
        <p class="body-text">${s.char_ko}</p>
        ${s.update?`<div class="col-label" style="margin-top:14px">최근 계획 현황 · Planning Update</div>
        <p class="body-text">${s.update}</p>`:''}
        <div class="eng-quote">${s.quote}</div>
      </div>
      <div class="col-box">
        <div class="col-label">도시 문제 · Urban Issues</div>
        <ul class="issue-list">${s.issues.map(iss=>`
        <li class="issue-item">
          <div class="idot" style="background:${s.color}"></div>
          <div><div>${iss.ko}</div><div class="issue-en">${iss.en}</div></div>
        </li>`).join('')}</ul>
      </div>
    </div>

    <div class="col-box-full">
      <div class="col-label">이해관계자 · Stakeholders</div>
      <table class="sh-table">
        <thead><tr><th>주체 · Actor</th><th>역할 및 현황 · Role & Status</th></tr></thead>
        <tbody>${s.stakeholders.map(sh=>`
        <tr><td><span class="sh-role">${sh.role}</span></td><td>${sh.desc}</td></tr>`).join('')}
        </tbody>
      </table>
    </div>

    <div class="col-box-full">
      <div class="col-label">영어 설명 · English Character</div>
      <p class="body-text" style="color:var(--ink3)">${s.char_en}</p>
    </div>

    <div class="spot-nav">
      <button class="snav-btn ${!prev?'dim':''}" onclick="${prev?`go('${prev.id}')`:''}"">
        ← ${prev?`Spot ${prev.num} · ${prev.ko}`:'시작'}
      </button>
      <span class="snav-center" onclick="go('part1')">목록 · All Spots</span>
      <button class="snav-btn ${!next?'dim':''}" onclick="${next?`go('${next.id}')`:''}"">
        ${next?`Spot ${next.num} · ${next.ko}`:'끝'} →
      </button>
    </div>
  </div>`;
}

function renderPart2(){
  return `
  <div class="gloss-header">
    <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#555;margin-bottom:8px;">Part 2 · 핵심 용어집</div>
    <h1>Urban Design<br><em>Glossary</em></h1>
  </div>
  <div class="gloss-wrap">
    <p class="gloss-intro">총 37개 용어 · 도시설계·교통 분야 핵심 개념 한/영 정리</p>
    <table class="gloss-table">
      <thead><tr><th style="width:22%">한국어</th><th style="width:32%">English</th><th>설명 · Note</th></tr></thead>
      <tbody>${GLOSSARY.map(cat=>`
        <tr class="cat-row"><td colspan="3" style="border-left:3px solid ${cat.color}">${cat.cat}</td></tr>
        ${cat.terms.map(t=>`
        <tr>
          <td><span class="gloss-ko">${t.ko}</span></td>
          <td><span class="gloss-en" style="color:${cat.color}">${t.en}</span></td>
          <td><span class="gloss-note">${t.note}</span></td>
        </tr>`).join('')}`).join('')}
      </tbody>
    </table>
  </div>`;
}

// ── ROUTER ───────────────────────────────────────────────
function go(id){location.hash=id;}

function render(){
  const hash=location.hash.replace('#','')||'home';
  const spot=SPOTS.find(s=>s.id===hash);
  let html='';
  if(hash==='home')html=renderHome();
  else if(hash==='part1')html=renderPart1();
  else if(hash==='part2')html=renderPart2();
  else if(spot)html=renderSpot(spot);
  else html=renderHome();
  document.getElementById('app').innerHTML=`<div class="page on">${html}</div>`;
  window.scrollTo(0,0);
  ['home','part1','part2'].forEach(id=>{
    const el=document.getElementById('nl-'+id);
    if(el)el.classList.toggle('on',hash===id||(id==='part1'&&!!spot));
  });
}
window.addEventListener('hashchange',render);
render();
</script>
</body>
</html>
