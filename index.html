<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Design Glossary — Vienna Workshop 2025</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #FAFAF8;
    --white:   #FFFFFF;
    --ink:     #1A1916;
    --ink2:    #4A4845;
    --ink3:    #9A9895;
    --rule:    #E8E5E0;
    --rule2:   #F0EDE8;
 
    --c1: #C8A96E;
    --c2: #7EB8A0;
    --c3: #8FA8C8;
    --c4: #C87E8A;
    --c5: #A07EB8;
    --c6: #B8A07E;
  }
 
  * { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }
 
  /* ── HEADER ── */
  .site-header {
    background: var(--white);
    border-bottom: 1px solid var(--rule);
    position: sticky;
    top: 0;
    z-index: 50;
    padding: 0 48px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: .14em;
    color: var(--ink2);
    text-transform: uppercase;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: .1em;
    color: var(--ink3);
    border: 1px solid var(--rule);
    padding: 3px 12px;
    border-radius: 20px;
  }
  .term-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--ink3);
    letter-spacing: .06em;
  }
 
  /* ── HERO ── */
  .hero {
    background: var(--white);
    border-bottom: 1px solid var(--rule);
    padding: 52px 48px 40px;
  }
  .hero h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(32px, 4vw, 48px);
    font-weight: 400;
    color: var(--ink);
    line-height: 1.15;
    margin-bottom: 10px;
  }
  .hero h1 em {
    font-style: italic;
    color: var(--ink3);
  }
  .hero-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: .1em;
    color: var(--ink3);
    text-transform: uppercase;
    margin-bottom: 28px;
  }
 
  /* ── CONTROLS ── */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .search-wrap {
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: .35;
  }
  #search {
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 8px 14px 8px 36px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    color: var(--ink);
    width: 260px;
    outline: none;
    transition: border-color .2s;
  }
  #search:focus { border-color: var(--ink3); }
  #search::placeholder { color: var(--ink3); }
 
  .divider { width: 1px; height: 20px; background: var(--rule); }
 
  .pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .pill {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: .06em;
    padding: 4px 14px;
    border-radius: 20px;
    border: 1px solid var(--rule);
    cursor: pointer;
    background: transparent;
    color: var(--ink3);
    transition: all .15s;
  }
  .pill:hover { border-color: var(--ink3); color: var(--ink2); }
  .pill.active-all {
    background: var(--ink);
    color: var(--white);
    border-color: var(--ink);
  }
 
  /* ── MAIN ── */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 48px 80px;
  }
 
  /* ── CATEGORY SECTION ── */
  .cat-section {
    margin-bottom: 48px;
    animation: fadeUp .4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
 
  .cat-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--rule);
  }
  .cat-stripe {
    width: 3px;
    height: 28px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .cat-icon {
    font-size: 14px;
    line-height: 1;
  }
  .cat-label {
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: .02em;
  }
  .cat-en {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: .08em;
    color: var(--ink3);
    margin-top: 1px;
  }
  .cat-num {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--ink3);
    border: 1px solid var(--rule);
    border-radius: 10px;
    padding: 1px 10px;
  }
 
  /* ── TERM GRID ── */
  .term-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 8px;
  }
 
  .term-card {
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 14px 16px 14px 20px;
    position: relative;
    overflow: hidden;
    transition: box-shadow .2s, border-color .2s;
    cursor: default;
  }
  .term-card:hover {
    box-shadow: 0 2px 12px rgba(0,0,0,.06);
  }
  .term-card .accent-bar {
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    border-radius: 8px 0 0 8px;
    opacity: .5;
  }
  .term-ko {
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 3px;
    line-height: 1.3;
  }
  .term-en {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: .04em;
    margin-bottom: 7px;
    line-height: 1.4;
  }
  .term-note {
    font-size: 11.5px;
    color: var(--ink3);
    line-height: 1.6;
  }
 
  /* ── EMPTY ── */
  .empty {
    text-align: center;
    padding: 64px 0;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--ink3);
    letter-spacing: .08em;
  }
 
  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--rule);
    background: var(--white);
    padding: 20px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  footer .f1 {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: .08em;
    color: var(--ink3);
    text-transform: uppercase;
  }
  footer .f2 {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink3);
  }
 
  @media (max-width: 700px) {
    .site-header, .hero, .main, footer { padding-left: 20px; padding-right: 20px; }
    .controls { flex-direction: column; align-items: flex-start; }
    #search { width: 100%; }
    .divider { display: none; }
  }
</style>
</head>
<body>
 
<header class="site-header">
  <span class="logo">Urban Design Glossary</span>
  <div class="header-right">
    <span class="term-count" id="term-count">37 terms</span>
    <span class="badge">Vienna Workshop 2025</span>
  </div>
</header>
 
<section class="hero">
  <div class="hero-sub">도시설계·교통 핵심 용어집 · Field Reference</div>
  <h1>Planning Terms<br><em>for Vienna</em></h1>
  <div style="height:28px"></div>
  <div class="controls">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search" placeholder="검색 / Search…">
    </div>
    <div class="divider"></div>
    <div class="pills" id="pills"></div>
  </div>
</section>
 
<main class="main" id="main-content"></main>
 
<footer>
  <span class="f1">Seoul National University · Urban Planning · 2025</span>
  <span class="f2">Vienna Workshop — Urban Design Glossary</span>
</footer>
 
<script>
const CATS = [
  {
    id: "metrics", label: "규제 지표", en: "Planning Metrics", color: "#C8A96E", icon: "⬛",
    terms: [
      { ko: "용도지역",      en: "Zoning District",          note: "토지 사용 목적을 법적으로 구분" },
      { ko: "용적률",        en: "Floor Area Ratio (FAR)",    note: "연면적 / 대지면적 × 100" },
      { ko: "건폐율",        en: "Building Coverage Ratio (BCR)", note: "건축면적 / 대지면적 × 100" },
      { ko: "세트백",        en: "Setback",                  note: "건물과 부지 경계선 간 이격 거리" },
      { ko: "최고높이 제한", en: "Height Limit",             note: "조망·경관 보호 등 목적" },
      { ko: "공공기여",      en: "Development Contribution", note: "개발이익의 공공 환원" },
      { ko: "입체적 토지이용", en: "Multi-level Land Use",   note: "지상·지하·공중 복합 활용" },
    ],
  },
  {
    id: "parcel", label: "필지·획지", en: "Lot & Unit", color: "#7EB8A0", icon: "⬜",
    terms: [
      { ko: "필지",       en: "Lot / Parcel",      note: "지적 등록 단위" },
      { ko: "합필",       en: "Lot Consolidation", note: "여러 필지를 하나로 합침" },
      { ko: "분필",       en: "Lot Subdivision",   note: "하나의 필지를 분리" },
      { ko: "획지",       en: "Planning Unit",     note: "계획적 개발 단위, 여러 필지 포함 가능" },
      { ko: "지구단위계획", en: "District Unit Plan", note: "소규모 도시설계 수단" },
      { ko: "기반시설",   en: "Infrastructure",    note: "도로·공원·학교 등 공공시설" },
    ],
  },
  {
    id: "street", label: "가로·이동", en: "Street & Mobility", color: "#8FA8C8", icon: "→",
    terms: [
      { ko: "차 없는 거리 (임시)", en: "Temporary Pedestrianization / Open Street", note: "신촌 차 없는 거리 등 요일제 운영" },
      { ko: "보행자 전용구역",    en: "Pedestrian-only Zone",              note: "상시 차량 통제" },
      { ko: "슈퍼블록",          en: "Superblock",                        note: "블록 단위 통과교통 차단 (바르셀로나 모델)" },
      { ko: "공유 가로",         en: "Shared Street / Woonerf",           note: "보행·자전거·차량 동등 사용" },
      { ko: "차로 다이어트",     en: "Road Diet",                         note: "차로 수 축소 → 보행·자전거 공간 확보" },
      { ko: "PM 전용차로",       en: "Micro-mobility Lane / PM Lane",     note: "전동킥보드·자전거 전용 공간" },
      { ko: "퍼스트·라스트 마일", en: "First / Last Mile Connectivity",   note: "대중교통 접근 전후 구간 연계" },
      { ko: "주차장 공원화",     en: "Parklet",                           note: "주차공간을 녹지·공공공간으로 전환" },
    ],
  },
  {
    id: "tod", label: "TOD·고밀개발", en: "TOD & Density", color: "#C87E8A", icon: "⬡",
    terms: [
      { ko: "대중교통 중심 개발", en: "Transit-Oriented Development (TOD)", note: "역 반경 500m 내 고밀·복합개발" },
      { ko: "역세권 고밀개발",   en: "Station Area Intensification",       note: "역 인근 용적률 상향 + 복합화" },
      { ko: "역세권 복합개발",   en: "Transit Node Mixed-use Dev.",        note: "상업·주거·업무 복합" },
      { ko: "15분 도시",         en: "15-Minute City",                    note: "생활 인프라를 도보 15분 내 배치 (파리 모델)" },
      { ko: "직주근접",          en: "Jobs-housing Proximity",            note: "주거와 직장의 공간적 근접" },
      { ko: "혼합 용도 개발",    en: "Mixed-use Development",             note: "단일 건물·블록 내 복수 기능 결합" },
    ],
  },
  {
    id: "public", label: "공공공간·경관", en: "Public Space & Landscape", color: "#A07EB8", icon: "◯",
    terms: [
      { ko: "공공공간",    en: "Public Space",                  note: "광장·보행로·공원 등 공개된 공간" },
      { ko: "조망권",      en: "View Rights / Scenic View Corridor", note: "특정 경관 보호를 위한 시각축" },
      { ko: "경관계획",    en: "Landscape / Townscape Plan",   note: "도시 외관·스카이라인 관리" },
      { ko: "녹지 네트워크", en: "Green Network",             note: "공원·녹도 연결 체계" },
      { ko: "보행 연결성", en: "Pedestrian Connectivity",      note: "보행 네트워크의 연속성·접근성" },
      { ko: "구릉지 개발", en: "Hillside Development",         note: "경사지 지형을 고려한 건축·계획" },
    ],
  },
  {
    id: "housing", label: "주거·재생", en: "Housing & Regeneration", color: "#B8A07E", icon: "⌂",
    terms: [
      { ko: "도시재생",          en: "Urban Regeneration",                  note: "물리·사회·경제적 종합 정비" },
      { ko: "포용적 용도지역제", en: "Inclusionary Zoning",                 note: "일정 비율 공공·임대주택 의무화" },
      { ko: "커뮤니티 토지신탁", en: "Community Land Trust (CLT)",          note: "토지 공공 보유 + 건물만 민간 소유" },
      { ko: "공공주도 개발",     en: "Public-led Development",              note: "공공이 주도권 갖는 개발방식" },
      { ko: "역사문화환경",      en: "Historic Cultural Environment",       note: "문화재 주변 관리·보전 구역" },
      { ko: "도시재생활성화지역", en: "Urban Regeneration Activation Area", note: "국가 지정 재생 집중 지원 구역" },
    ],
  },
];
 
const totalTerms = CATS.reduce((a, c) => a + c.terms.length, 0);
document.getElementById('term-count').textContent = `${totalTerms} terms`;
 
let activeId = null;
let searchVal = '';
 
// Build pills
const pillsEl = document.getElementById('pills');
 
const allPill = document.createElement('button');
allPill.className = 'pill active-all';
allPill.textContent = '전체';
allPill.onclick = () => { activeId = null; render(); updatePills(); };
pillsEl.appendChild(allPill);
 
CATS.forEach(cat => {
  const p = document.createElement('button');
  p.className = 'pill';
  p.textContent = cat.label;
  p.style.color = cat.color;
  p.style.borderColor = cat.color + '55';
  p.dataset.id = cat.id;
  p.onclick = () => {
    activeId = activeId === cat.id ? null : cat.id;
    render();
    updatePills();
  };
  pillsEl.appendChild(p);
});
 
function updatePills() {
  allPill.className = activeId === null ? 'pill active-all' : 'pill';
  allPill.style.color = '';
  document.querySelectorAll('.pill[data-id]').forEach(p => {
    const cat = CATS.find(c => c.id === p.dataset.id);
    if (p.dataset.id === activeId) {
      p.style.background = cat.color;
      p.style.color = '#fff';
      p.style.borderColor = cat.color;
    } else {
      p.style.background = 'transparent';
      p.style.color = cat.color;
      p.style.borderColor = cat.color + '55';
    }
  });
}
 
document.getElementById('search').addEventListener('input', e => {
  searchVal = e.target.value;
  render();
});
 
function render() {
  const container = document.getElementById('main-content');
  container.innerHTML = '';
 
  let totalVisible = 0;
  let anySeen = false;
 
  CATS.forEach((cat, ci) => {
    if (activeId && cat.id !== activeId) return;
 
    const terms = cat.terms.filter(t =>
      !searchVal ||
      t.ko.includes(searchVal) ||
      t.en.toLowerCase().includes(searchVal.toLowerCase()) ||
      t.note.includes(searchVal)
    );
    if (!terms.length) return;
 
    totalVisible += terms.length;
    anySeen = true;
 
    const sec = document.createElement('div');
    sec.className = 'cat-section';
    sec.style.animationDelay = `${ci * 0.05}s`;
 
    sec.innerHTML = `
      <div class="cat-header">
        <div class="cat-stripe" style="background:${cat.color}"></div>
        <span class="cat-icon" style="color:${cat.color}">${cat.icon}</span>
        <div>
          <div class="cat-label">${cat.label}</div>
          <div class="cat-en">${cat.en}</div>
        </div>
        <div class="cat-num">${terms.length}</div>
      </div>
      <div class="term-grid"></div>
    `;
 
    const grid = sec.querySelector('.term-grid');
 
    terms.forEach((term, ti) => {
      const card = document.createElement('div');
      card.className = 'term-card';
      card.style.animationDelay = `${ci * 0.05 + ti * 0.03}s`;
      card.innerHTML = `
        <div class="accent-bar" style="background:${cat.color}"></div>
        <div class="term-ko">${highlight(term.ko)}</div>
        <div class="term-en" style="color:${cat.color}">${highlight(term.en)}</div>
        <div class="term-note">${highlight(term.note)}</div>
      `;
      card.addEventListener('mouseenter', () => {
        card.style.borderColor = cat.color + '88';
        card.querySelector('.accent-bar').style.opacity = '1';
      });
      card.addEventListener('mouseleave', () => {
        card.style.borderColor = '';
        card.querySelector('.accent-bar').style.opacity = '.5';
      });
      grid.appendChild(card);
    });
 
    container.appendChild(sec);
  });
 
  if (!anySeen) {
    container.innerHTML = `<div class="empty">검색 결과가 없습니다 · No results found</div>`;
  }
 
  document.getElementById('term-count').textContent = `${totalVisible} terms`;
}
 
function highlight(text) {
  if (!searchVal) return text;
  const escaped = searchVal.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'),
    '<mark style="background:#FDE68A;color:#1A1916;border-radius:2px;padding:0 1px">$1</mark>');
}
 
render();
</script>
</body>
</html>
