<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNU-TUW Urban Planning Workshop 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:#fff;color:#000;font-family:'Inter',sans-serif;font-weight:400;font-size:14px;line-height:1.6;}
nav{background:#000;position:sticky;top:0;z-index:200;height:48px;display:flex;align-items:center;padding:0 40px;justify-content:space-between;gap:12px;}
.logo{font-size:10px;letter-spacing:.15em;color:#fff;text-transform:uppercase;font-weight:800;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.hamburger-btn{background:none;border:none;cursor:pointer;padding:8px;display:flex;flex-direction:column;gap:5px;flex-shrink:0;}
.hamburger-btn span{display:block;width:20px;height:2px;background:#fff;transition:all .2s;}
.drop-menu{position:fixed;top:48px;left:0;right:0;background:#000;z-index:199;display:none;border-top:1px solid rgba(255,255,255,.1);}
.drop-menu.open{display:block;}
.drop-item{display:block;width:100%;padding:16px 40px;font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);cursor:pointer;border:none;background:none;font-family:'Inter',sans-serif;text-align:left;transition:all .15s;border-bottom:1px solid rgba(255,255,255,.07);}
.drop-item:last-child{border-bottom:none;}
.drop-item:hover{color:#fff;background:rgba(255,255,255,.05);}
.drop-item.on{color:#000;background:#fff;}
.lang-group{display:flex;gap:3px;flex-shrink:0;}
.lang-btn{font-size:9px;letter-spacing:.08em;padding:4px 9px;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.4);cursor:pointer;font-weight:700;text-transform:uppercase;transition:all .15s;border-radius:2px;font-family:'Inter',sans-serif;background:transparent;}
.lang-btn.on{background:#fff;color:#000;border-color:#fff;}
.lang-btn:hover:not(.on){border-color:rgba(255,255,255,.6);color:rgba(255,255,255,.9);}
.hero{padding:64px 40px 44px;border-bottom:2px solid #000;}
.hero-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#888;margin-bottom:12px;font-weight:700;}
.hero h1{font-size:clamp(32px,5vw,62px);font-weight:900;line-height:1.0;letter-spacing:-.03em;margin-bottom:14px;}
.hero-desc{font-size:13.5px;line-height:1.85;color:#444;max-width:580px;font-weight:300;}
.stats-row{display:flex;border-bottom:2px solid #000;flex-wrap:wrap;}
.stat-cell{flex:1;min-width:130px;padding:18px 24px;border-right:1px solid #e0e0e0;}
.stat-cell:last-child{border-right:none;}
.sn{font-size:24px;font-weight:900;letter-spacing:-.03em;margin-bottom:2px;}
.sl{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:#888;font-weight:700;}
.map-section{max-width:960px;margin:0 auto;padding:0 40px 48px;}
.map-ext-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border:2px solid #000;background:#fff;font-size:11px;color:#000;font-weight:700;font-family:'Inter',sans-serif;text-decoration:none;transition:all .15s;margin-top:10px;}
.map-ext-btn:hover{background:#000;color:#fff;}
.spots-section{max-width:960px;margin:0 auto;padding:0 40px 80px;}
.sec-title{font-size:20px;font-weight:900;letter-spacing:-.02em;margin-bottom:18px;}
.spots-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:#000;border:1px solid #000;}
.scard{background:#fff;padding:18px 20px;cursor:pointer;transition:background .12s;}
.scard:hover{background:#f5f5f5;}
.scard-num{font-size:8px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:5px;font-weight:700;color:#888;}
.scard-main{font-size:13px;font-weight:700;letter-spacing:-.01em;margin-bottom:1px;}
.scard-sub{font-size:10px;color:#888;margin-bottom:9px;font-weight:400;}
.scard-tags{display:flex;flex-wrap:wrap;gap:3px;align-items:center;}
.stag{font-size:7px;letter-spacing:.07em;padding:2px 6px;background:#f0f0f0;color:#888;border:1px solid #e0e0e0;font-weight:600;text-transform:uppercase;}
.scard-arr{margin-left:auto;font-size:13px;font-weight:900;}
.spot-top{padding:40px 40px 26px;border-bottom:2px solid #000;}
.spot-top-inner{max-width:960px;margin:0 auto;}
.spot-badge{width:40px;height:40px;border-radius:50%;background:#000;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;margin-bottom:14px;}
.spot-main{font-size:clamp(22px,4vw,36px);font-weight:900;letter-spacing:-.03em;margin-bottom:3px;}
.spot-sub{font-size:10px;color:#888;margin-bottom:14px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;}
.tag-row{display:flex;flex-wrap:wrap;gap:4px;}
.spot-tag{font-size:8px;letter-spacing:.09em;padding:3px 9px;background:#f0f0f0;color:#888;border:1px solid #e0e0e0;font-weight:700;text-transform:uppercase;}
.spot-wrap{max-width:960px;margin:0 auto;padding:30px 40px 80px;}
.crumb{display:flex;align-items:center;gap:8px;margin-bottom:24px;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;}
.crumb span{cursor:pointer;}
.crumb span:hover{color:#000;}
.crumb-sep{color:#ccc;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1px;margin-bottom:1px;background:#000;}
.cbox{background:#fff;padding:22px 24px;}
.cbox-full{background:#fff;border:1px solid #000;padding:22px 24px;margin-bottom:1px;}
.clabel{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:#888;padding-bottom:10px;border-bottom:1px solid #e0e0e0;margin-bottom:12px;font-weight:700;}
.btext{font-size:13px;line-height:1.9;color:#333;font-weight:300;}
.btext+.btext{margin-top:10px;}
.ilist{list-style:none;display:flex;flex-direction:column;gap:9px;}
.iitem{display:flex;gap:10px;font-size:12px;color:#333;line-height:1.65;font-weight:300;}
.idot{width:4px;height:4px;border-radius:50%;margin-top:9px;flex-shrink:0;background:#000;}
.shtable{width:100%;border-collapse:collapse;}
.shtable th{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:#888;text-align:left;padding:7px 12px;border-bottom:2px solid #000;background:#f5f5f5;font-weight:700;}
.shtable td{padding:9px 12px;border-bottom:1px solid #e0e0e0;font-size:12px;color:#333;line-height:1.6;vertical-align:top;font-weight:300;}
.shtable tr:last-child td{border-bottom:none;}
.sh-role{font-weight:700;color:#000;font-size:12px;display:block;margin-bottom:1px;}
.quote{font-size:13px;line-height:1.8;color:#444;padding:14px 18px;border-left:3px solid #000;background:#f5f5f5;margin-top:14px;font-weight:300;font-style:italic;}
.spot-nav{display:flex;justify-content:space-between;margin-top:28px;padding-top:18px;border-top:2px solid #000;gap:8px;}
.snbtn{display:flex;align-items:center;gap:7px;padding:9px 16px;border:2px solid #000;cursor:pointer;background:#fff;font-size:11px;color:#000;transition:all .15s;font-weight:700;font-family:'Inter',sans-serif;}
.snbtn:hover{background:#000;color:#fff;}
.snbtn.dim{opacity:.2;pointer-events:none;}
.sncenter{font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:9px 16px;border:2px solid #000;cursor:pointer;background:#f5f5f5;color:#000;font-weight:700;font-family:'Inter',sans-serif;}
.sncenter:hover{background:#000;color:#fff;}
.dark-hero{background:#000;padding:64px 40px 44px;}
.dark-hero .hero-label{color:rgba(255,255,255,.3);}
.dark-hero h1{color:#fff;font-size:clamp(28px,4.5vw,52px);font-weight:900;line-height:1.0;letter-spacing:-.03em;margin-bottom:4px;}
.dark-hero p{font-size:9px;letter-spacing:.18em;color:#555;text-transform:uppercase;font-weight:700;}
.gloss-wrap{max-width:960px;margin:0 auto;padding:36px 40px 80px;}
.gloss-intro{font-size:12px;color:#888;margin-bottom:28px;font-weight:400;}
.gtable{width:100%;border-collapse:collapse;}
.gtable th{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:#888;text-align:left;padding:8px 14px;border-bottom:2px solid #000;background:#f5f5f5;font-weight:700;}
.gtable td{padding:9px 14px;border-bottom:1px solid #e0e0e0;font-size:12px;line-height:1.5;vertical-align:top;}
.gtable tr:hover td{background:#fafafa;}
.g-ko{font-weight:700;color:#000;}
.g-de{font-size:11px;color:#444;font-weight:500;}
.g-en{font-size:10px;color:#666;font-weight:400;}
.g-note{color:#888;font-size:11px;font-weight:300;}
.cat-row td{background:#000!important;color:#fff;font-size:8px;letter-spacing:.18em;text-transform:uppercase;padding:7px 14px;border-bottom:none;font-weight:800;}
.sch-content{max-width:640px;margin:0 auto;padding:0 40px 80px;}
.sv-phase{margin-top:28px;margin-bottom:32px;}
.sv-phase-label{font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:#888;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-weight:700;border-bottom:2px solid #000;padding-bottom:8px;}
.sv-pill{font-size:8px;padding:2px 8px;background:#000;color:#fff;font-weight:800;letter-spacing:.08em;}
.sv-row{display:grid;grid-template-columns:60px 1fr;border-bottom:1px solid #e0e0e0;}
.sv-row:last-child{border-bottom:none;}
.sv-day{padding:14px 10px 14px 0;text-align:right;border-right:2px solid #000;}
.sv-d{font-size:22px;font-weight:900;line-height:1;letter-spacing:-.03em;}
.sv-w{font-size:8px;color:#888;margin-top:2px;font-weight:700;letter-spacing:.08em;}
.sv-body{padding:12px 0 12px 16px;display:flex;flex-direction:column;gap:6px;}
.sv-line{display:flex;gap:8px;align-items:baseline;}
.sv-t{font-size:8px;color:#888;min-width:26px;font-weight:700;letter-spacing:.04em;flex-shrink:0;text-transform:uppercase;}
.sv-c{font-size:12.5px;line-height:1.5;font-weight:400;}
.etag{display:inline-block;font-size:7px;letter-spacing:.08em;padding:2px 6px;font-weight:800;text-transform:uppercase;margin-right:5px;vertical-align:1px;}
.etag-field{background:#000;color:#fff;}
.etag-intro{background:#444;color:#fff;}
.etag-work{background:#000;color:#fff;}
.etag-pres{background:#000;color:#fff;}
.etag-free{background:#e0e0e0;color:#888;}
.sv-route{font-size:10px;color:#888;margin-top:3px;padding:5px 10px;background:#f5f5f5;border-left:2px solid #000;line-height:1.6;}
.dv-wrap{display:none;padding-top:4px;}
.dv-day{margin-top:28px;}
.dv-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid #000;flex-wrap:wrap;}
.dv-date{font-size:16px;font-weight:900;letter-spacing:-.02em;}
.dv-room{font-size:8px;color:#888;padding:2px 8px;border:1px solid #e0e0e0;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
.dv-phase-tag{font-size:8px;padding:2px 9px;background:#000;color:#fff;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-left:auto;}
.dv-host-row{width:100%;font-size:10px;color:#555;font-weight:500;padding-top:6px;margin-top:2px;letter-spacing:.02em;display:flex;flex-wrap:wrap;gap:0 20px;}
.dv-host-seg{display:flex;align-items:center;gap:5px;}
.dv-host-lbl{font-size:8px;letter-spacing:.12em;text-transform:uppercase;font-weight:800;color:#888;}
.dv-host-name{font-size:10px;color:#333;font-weight:400;}
.dv-block{display:grid;grid-template-columns:100px 1fr;margin-bottom:1px;}
.dv-time{font-size:9px;color:#888;padding:9px 10px 9px 0;text-align:right;border-right:2px solid #000;line-height:1.4;font-weight:600;letter-spacing:.02em;}
.dv-info{padding:8px 0 8px 14px;}
.dv-name{font-size:12.5px;line-height:1.5;font-weight:400;}
.dv-break .dv-time{color:#ccc;}
.dv-break .dv-name{color:#bbb;font-size:11px;}
.notice-board-wrap{border-bottom:2px solid #000;background:#fafafa;}
.notice-board{max-width:640px;margin:0 auto;padding:20px 40px 22px;}
.notice-board-label{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.notice-item{padding:11px 14px;border-left:3px solid #000;background:#fff;margin-bottom:6px;position:relative;}
.notice-item-text{font-size:12.5px;line-height:1.75;color:#000;font-weight:400;white-space:pre-wrap;padding-right:24px;}
.notice-item-meta{font-size:9px;color:#aaa;margin-top:5px;font-weight:500;letter-spacing:.04em;}
.notice-del-btn{position:absolute;top:9px;right:10px;border:none;background:none;cursor:pointer;font-size:11px;color:#ccc;padding:2px 5px;line-height:1;}
.notice-del-btn:hover{color:#000;}
.notice-empty{font-size:11px;color:#ccc;padding:8px 0;font-style:italic;}
.notice-manage-link{font-size:9px;color:#aaa;cursor:pointer;letter-spacing:.04em;text-decoration:underline;text-underline-offset:3px;}
.notice-manage-link:hover{color:#000;}
.staff-wrap{max-width:640px;margin:0 auto;padding:32px 40px 80px;}
.staff-login-card{border:2px solid #000;padding:36px 32px;max-width:340px;margin:40px auto;}
.staff-login-title{font-size:15px;font-weight:900;letter-spacing:-.02em;margin-bottom:4px;}
.staff-login-sub{font-size:11px;color:#888;margin-bottom:22px;font-weight:400;}
.staff-pw-row{display:flex;gap:0;}
.staff-pw-input{flex:1;border:2px solid #000;border-right:none;padding:10px 12px;font-family:'Inter',sans-serif;font-size:12px;outline:none;}
.staff-pw-btn{padding:10px 18px;border:2px solid #000;background:#000;color:#fff;font-family:'Inter',sans-serif;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;}
.staff-pw-btn:hover{background:#333;}
.staff-pw-error{font-size:10px;color:#c00;margin-top:7px;display:none;font-weight:500;}
.staff-status-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#f5f5f5;border:1px solid #e0e0e0;margin-bottom:28px;font-size:11px;font-weight:600;}
.staff-logout-btn{font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;border:1px solid #000;background:#fff;cursor:pointer;font-family:'Inter',sans-serif;font-weight:700;}
.staff-logout-btn:hover{background:#000;color:#fff;}
.staff-section{margin-bottom:32px;}
.staff-sec-hd{font-size:8px;letter-spacing:.18em;text-transform:uppercase;font-weight:800;border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:16px;color:#000;}
.notice-textarea{width:100%;border:2px solid #000;padding:10px 12px;font-family:'Inter',sans-serif;font-size:12px;line-height:1.75;outline:none;resize:vertical;min-height:76px;}
.notice-post-row{display:flex;justify-content:flex-end;margin-top:6px;}
.notice-post-btn{padding:8px 20px;border:2px solid #000;background:#000;color:#fff;font-family:'Inter',sans-serif;font-size:10px;font-weight:700;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;}
.notice-post-btn:hover{background:#333;}
.notice-list-wrap{margin-top:14px;}
.ctabs{display:flex;gap:2px;margin-bottom:14px;flex-wrap:wrap;}
.ctab{padding:6px 12px;border:1px solid #e0e0e0;font-size:9px;font-weight:700;letter-spacing:.08em;cursor:pointer;background:#fff;font-family:'Inter',sans-serif;color:#888;transition:all .12s;text-transform:uppercase;}
.ctab.on{background:#000;color:#fff;border-color:#000;}
.ctab:hover:not(.on){border-color:#000;color:#000;}
.cl-person-name{font-size:13px;font-weight:700;margin-bottom:2px;}
.cl-person-role{font-size:10px;color:#888;margin-bottom:10px;font-weight:400;}
.cl-stats{font-size:9px;color:#888;margin-bottom:8px;font-weight:600;letter-spacing:.04em;display:flex;align-items:center;gap:8px;}
.cl-clear-btn{font-size:8px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border:1px solid #ccc;background:#fff;cursor:pointer;font-family:'Inter',sans-serif;color:#888;font-weight:700;}
.cl-clear-btn:hover{border-color:#000;color:#000;}
.task-list{display:flex;flex-direction:column;gap:2px;margin-bottom:10px;}
.task-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid #ebebeb;background:#fff;transition:background .1s;}
.task-item:hover{background:#fafafa;}
.task-cb{width:14px;height:14px;cursor:pointer;flex-shrink:0;accent-color:#000;}
.task-label{font-size:12px;flex:1;line-height:1.5;cursor:pointer;user-select:none;}
.task-label.done{text-decoration:line-through;color:#bbb;}
.task-del{border:none;background:none;cursor:pointer;font-size:10px;color:#ddd;padding:2px 4px;flex-shrink:0;line-height:1;}
.task-del:hover{color:#000;}
.task-add-row{display:flex;gap:0;}
.task-add-input{flex:1;border:2px solid #000;border-right:none;padding:9px 12px;font-family:'Inter',sans-serif;font-size:12px;outline:none;}
.task-add-input::placeholder{color:#ccc;}
.task-add-btn{padding:9px 16px;border:2px solid #000;background:#000;color:#fff;font-family:'Inter',sans-serif;font-size:16px;font-weight:300;cursor:pointer;line-height:1;}
.task-add-btn:hover{background:#333;}
.task-empty{font-size:11px;color:#ccc;padding:10px 0;font-style:italic;}
.contact-section{border-top:2px solid #000;background:#f5f5f5;padding:28px 40px;}
.contact-inner{max-width:960px;margin:0 auto;}
.contact-title{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #d0d0d0;}
.contact-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#d0d0d0;border:1px solid #d0d0d0;}
.contact-card{background:#f5f5f5;padding:14px 16px;}
.contact-role{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:6px;}
.contact-name{font-size:12px;font-weight:700;color:#000;margin-bottom:4px;}
.contact-info{font-size:11px;color:#555;line-height:1.7;font-weight:300;}
.contact-info a{color:#555;text-decoration:none;}
.contact-info a:hover{color:#000;}
footer{border-top:2px solid #000;background:#fff;padding:16px 40px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.f1{font-size:9px;letter-spacing:.12em;color:#888;text-transform:uppercase;font-weight:700;}
@media(max-width:720px){
  nav{padding:0 16px;}
  .logo{font-size:9px;}
  .hero,.map-section,.spots-section,.spot-top,.spot-wrap,.dark-hero,.gloss-wrap,.sch-content,.staff-wrap,footer{padding-left:20px;padding-right:20px;}
  .notice-board{padding-left:20px;padding-right:20px;}
  .spots-grid,.two-col{grid-template-columns:1fr;}
  .stat-cell{flex:0 0 50%;}
  .dv-block{grid-template-columns:76px 1fr;}
  .contact-grid{grid-template-columns:1fr;}
  .contact-section{padding-left:20px;padding-right:20px;}
  footer{flex-direction:column;gap:4px;text-align:center;}
  .ctabs{gap:3px;}
}
</style>
</head>
<body>
<nav>
  <span class="logo" onclick="go('home')">SNU × TUW 2026</span>
  <button class="hamburger-btn" id="ham-btn" onclick="toggleMenu()" aria-label="menu">
    <span></span><span></span><span></span>
  </button>
  <div class="lang-group">
    <span class="lang-btn on" id="lb-ko" onclick="setLang('ko')">KO</span>
    <span class="lang-btn"    id="lb-de" onclick="setLang('de')">DE</span>
    <span class="lang-btn"    id="lb-en" onclick="setLang('en')">EN</span>
  </div>
</nav>
<div class="drop-menu" id="drop-menu">
  <button class="drop-item" id="dm-home"  onclick="menuGo('home')"></button>
  <button class="drop-item" id="dm-site"  onclick="menuGo('site')"></button>
  <button class="drop-item" id="dm-sched" onclick="menuGo('sched')"></button>
  <button class="drop-item" id="dm-gloss" onclick="menuGo('gloss')"></button>
  <button class="drop-item" id="dm-staff" onclick="menuGo('staff')"></button>
</div>
<div id="app"></div>
<div class="contact-section" id="contact-section">
  <div class="contact-inner">
    <div class="contact-title" id="contact-title">Contact</div>
    <div class="contact-grid">
      <div class="contact-card">
        <div class="contact-role" id="ct-role1">Workshop Coordinator (SNU)</div>
        <div class="contact-name">Kim Jeonghye (PhD)</div>
        <div class="contact-info">rlawjdfod@snu.ac.kr</div>
      </div>
      <div class="contact-card">
        <div class="contact-role" id="ct-role2">Workshop Coordinator (TUW)</div>
        <div class="contact-name">Da.Yun Daun (PhD)</div>
        <div class="contact-info">da.yun@tuwien.ac.at</div>
      </div>
      <div class="contact-card">
        <div class="contact-role" id="ct-role3">Seongsu Tour</div>
        <div class="contact-name">Kwon Hyein (PhD)</div>
        <div class="contact-info">hein93328@snu.ac.kr</div>
      </div>
    </div>
  </div>
</div>
<footer>
  <span class="f1">Seoul National University × TU Wien · Urban Planning Workshop 2026</span>
  <span class="f1" id="f-right"></span>

function staffPostNotice(){

  const now = new Date();
  const newNotice = {
    id: Date.now(),
    text,
    date: now.toLocaleDateString('ko-KR',{month:'numeric',day:'numeric'}),
    time: now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}),

  fbNoticesRef.set({items: updated}).catch(function(e){console.error(e)});

    ${withDel?`<button class="notice-del-btn" onclick="staffDeleteNotice(${n.id})" title="삭제">✕</button>`:''}
  </div>`).join('');
}

let clActivePerson = 'jeonghye';

/* ── Checklist: Firebase-synced (replaces localStorage) ── */
function getTasks(pid){
  if(_allTasks[pid] && _allTasks[pid].length){
    return _allTasks[pid].map(function(t){ return {id:t.id, text:t.text, done:!!t.done}; });
  }
  return (DEFAULT_TASKS[pid]||[]).map(function(t){ return {id:t.id, text:t.text, done:!!t.done}; });
}
function saveTasks(pid, tasks){
  _allTasks[pid] = tasks;
  var payload = {};
  Object.keys(_allTasks).forEach(function(k){ payload[k] = _allTasks[k]; });
  /* also ensure default tasks for members not yet written */
  STAFF_MEMBERS.forEach(function(m){
    if(!payload[m.id]) payload[m.id] = (DEFAULT_TASKS[m.id]||[]).map(function(t){ return {id:t.id,text:t.text,done:!!t.done}; });
  });
  fbChecklistRef.set(payload).catch(function(e){ console.error(e); });
}

function clSwitch(pid){
  clActivePerson=pid;
  var el=document.getElementById('cl-panel');
  if(el) el.innerHTML=buildCLPanel();
}
function clToggle(pid,tid){
  var tasks=getTasks(pid).map(function(t){ return t.id===tid?{id:t.id,text:t.text,done:!t.done}:t; });
  saveTasks(pid,tasks);
}
function clDeleteTask(pid,tid){
  saveTasks(pid,getTasks(pid).filter(function(t){return t.id!==tid;}));
}
function clAddTask(pid){
  var inp=document.getElementById('cl-add-input');
  var text=inp&&inp.value.trim();
  if(!text) return;
  var tasks=getTasks(pid);
  tasks.push({id:Date.now(),text:text,done:false});
  saveTasks(pid,tasks);
}
function clClearDone(pid){
  saveTasks(pid,getTasks(pid).filter(function(t){return !t.done;}));
}
function buildCLPanel(){
  const pid=clActivePerson;
  const tasks=getTasks(pid);
  const done=tasks.filter(t=>t.done).length;
  const person=STAFF_MEMBERS.find(m=>m.id===pid);
  const tabs=STAFF_MEMBERS.map(m=>`<button class="ctab${m.id===pid?' on':''}" onclick="clSwitch('${m.id}')">${m.name.split(' ').pop()}</button>`).join('');
  const items=tasks.length
    ? tasks.map(t=>`<div class="task-item">
        <input type="checkbox" class="task-cb" ${t.done?'checked':''} onchange="clToggle('${pid}',${t.id})">
        <span class="task-label${t.done?' done':''}" onclick="clToggle('${pid}',${t.id})">${esc(t.text)}</span>
        <button class="task-del" onclick="clDeleteTask('${pid}',${t.id})" title="삭제">✕</button>
      </div>`).join('')
    : `<div class="task-empty">할일이 없습니다.</div>`;
  return `
    <div class="ctabs">${tabs}</div>
    <div class="cl-person-name">${person.name}</div>
    <div class="cl-person-role">${person.title}</div>
    <div class="cl-stats">
      <span>${done}/${tasks.length} 완료</span>
      ${done>0?`<button class="cl-clear-btn" onclick="clClearDone('${pid}')">완료 삭제</button>`:''}
    </div>
    <div class="task-list">${items}</div>
    <div class="task-add-row">
      <input id="cl-add-input" class="task-add-input" type="text" placeholder="할일 추가..."
        onkeydown="if(event.key==='Enter')clAddTask('${pid}')">
      <button class="task-add-btn" onclick="clAddTask('${pid}')">+</button>
    </div>`;
}

 {id:'spot2',num:2,ko:'해방촌 신흥시장 일대',de:'Sinheung-Markt Haebangchon',en:'Haebangchon Sinheung Market Area',sub:{ko:'자연발생적 혼합 용도와 도시재생',de:'Organische Nutzungsmischung & Stadterneuerung',en:'Spontaneous Mixed-use & Urban Regeneration'},tags:{ko:['자연발생 혼합용도','전통시장','도시재생','젠트리피케이션'],de:['Organische Nutzungsmischung','Traditioneller Markt','Stadterneuerung','Gentrifizierung'],en:['Spontaneous Mixed-use','Traditional Market','Urban Regeneration','Gentrification']},bg:{ko:'해방촌 신흥시장은 1945년 이후 피란민들이 남산 사면에 정착하며 삶의 터전으로 만든 자생적 시장에서 출발한다. 계획된 상업지구가 아니라 생존의 필요에 의해 형성된 공간인 만큼, 건물 구조와 골목의 배치가 불규칙하고 유기적이다. 2000년대 이후 노후화가 심화되면서 전면 철거 방식의 재개발이 논의되었으나, 결국 기존 골조와 공간 구조를 살리는 도시재생의 방법론을 택했다.',de:'Der Sinheung-Markt entstand nach 1945 als organischer Selbstversorgermarkt von Flüchtlingssiedlern. Nach Debatten über Totalabriss entschied man sich für Stadterneuerung.',en:'The Sinheung Market originated as a spontaneous survival market formed by refugees after 1945. Rather than demolition, urban regeneration preserved the existing structure.'},char:{ko:'좁고 미로 같은 골목 조직, 낮은 층고와 작은 칸막이로 구성된 점포 구조, 그리고 시장 특유의 열린 동선 체계가 공간의 기본 성격을 이룬다. 2019년 도시재생 뉴딜 사업이 오히려 외부에 해방촌을 발견하게 하는 계기가 되면서 임대료 상승과 젠트리피케이션 압력이 함께 심화되었다.',de:'Enge Gassen, niedrige Deckenhöhen und kleinteilige Ladeneinheiten prägen das Raumgefüge.',en:'Narrow maze-like alleys, low ceilings, and small shop units define the spatial character.'},issues:{ko:['도시재생 사업이 물리적 환경을 개선하면서도 기존 커뮤니티를 밀어내는 구조적 문제를 어떻게 읽을 것인가.','기존 니트 공장 등 가내수공업자와 오랜 원주민이 점차 밀려나고 있다.','원주민·영세 상인과 새로운 유입자 사이의 공존 가능성 및 제도적 장치의 필요성이 핵심 논점이다.','좁고 불규칙한 기존 시장 골격을 유지하면서 보행 편의·소방 접근·안전 등을 어떻게 확충할 것인가.'],de:['Stadterneuerung verbessert die Umgebung, verdrängt aber gleichzeitig die gewachsene Gemeinschaft.','Heimindustrielle und langjährige Bewohner werden schrittweise verdrängt.','Koexistenz von Alteingesessenen und Neuzugängen braucht institutionelle Steuerungsinstrumente.','Erhalt des Marktgefüges bei Modernisierung der Infrastruktur ist die Kernherausforderung.'],en:['Urban regeneration improving the physical environment while displacing the existing community is the core structural paradox.','Home-industry workers and long-term residents are being gradually pushed out.','Coexistence between original communities and newcomers requires institutional mechanisms.','Maintaining the narrow market structure while upgrading infrastructure is the key challenge.']},stakeholders:{ko:[{role:'신흥시장 상인',desc:'고령 상인 중심. 시장 현대화 및 후계자 부재 문제.'},{role:'가내수공업자 / 원주민',desc:'임대료 상승으로 이탈 압력.'},{role:'카페·게스트하우스 사업자',desc:'재생 이후 유입된 새 상업 세력.'}],de:[{role:'Sinheung-Markthändler',desc:'Überwiegend ältere Generation.'},{role:'Heimindustrielle / Altbewohner',desc:'Mietpreisanstieg erzeugt Verdrängungsdruck.'},{role:'Cafés / Gästehäuser',desc:'Post-Regenerationszuzug.'}],en:[{role:'Sinheung Market vendors',desc:'Mostly elderly traders.'},{role:'Home-industry workers / original residents',desc:'Displacement pressure from rising rents.'},{role:'Cafés / guesthouses',desc:'Post-regeneration newcomers.'}]},quote:'"설계 없이 형성된 혼합 용도가 어떻게 작동하는지 — 그리고 재생이 의도치 않게 그것을 해체하는 과정을 동시에 관찰할 수 있는 현장."'},
 {id:'spot3',num:3,ko:'소월로',de:'Sowol-ro',en:'Sowol-ro',sub:{ko:'남산 경계 가로',de:'Grenzstraße am Namsan',en:'Namsan Boundary Road'},tags:{ko:['경계 가로','남산 경관','보행 단절','차로 다이어트'],de:['Grenzstraße','Namsan-Panorama','Fußgängerunterbrechung','Straßenraumreduzierung'],en:['Boundary Road','Namsan Panorama','Pedestrian Severance','Road Diet']},bg:{ko:'소월로는 그랜드하얏트 호텔에서 남산도서관으로 이어지는 왕복 4차선 간선도로로, 남산 산턱을 따라 굽이치며 서울 도심을 향한 파노라마 조망이 펼쳐지는 구간이다.',de:'Sowol-ro ist eine 4-spurige Hauptstraße vom Grand Hyatt Hotel zur Namsan-Bibliothek, die dem Berghang folgt.',en:'Sowol-ro is a 4-lane arterial from the Grand Hyatt Hotel to the Namsan Library, winding along the mountain slope with panoramic views of central Seoul.'},char:{ko:'소월로는 현재 남산과 해방촌·이태원 주거지 사이를 물리적으로 가르는 장벽으로 기능한다. 급경사 내리막 구간에서의 차량 과속, 좁고 단절된 보행로, 위험한 횡단 구간이 반복된다.',de:'Sowol-ro wirkt als physische Barriere zwischen dem Namsan-Park und den Wohngebieten.',en:'Sowol-ro currently functions as a physical barrier separating Namsan from Haebangchon and Itaewon residential areas.'},issues:{ko:['차량 우선의 도로 단면이 어떻게 남산과 주거지 사이의 보행 단절을 심화시키는지가 핵심 논점이다.','경관과 이동성 사이의 균형, 차로 구성의 재편 가능성을 검토해야 한다.','위(남산)와 아래(주거지)를 잇는 입체적 보행 네트워크의 구성 방안이 필요하다.','소월로가 단순한 통과 도로가 아니라 남산의 녹지와 주거지를 연결하는 공간으로 기능할 수 있는지 검토가 필요하다.'],de:['Wie die fahrzeugpriorisierte Straße die Fußgängerverbindung unterbricht, ist die Kernfrage.','Balance zwischen Landschaft und Mobilität ist zu prüfen.','Mehrdimensionales Fußwegenetz zwischen Berg und Tal ist zu entwickeln.','Kann Sowol-ro als Grünraumverbindung fungieren?'],en:['How the vehicle-priority cross-section deepens pedestrian severance is the core question.','Balance between landscape and mobility needs examination.','A multi-level pedestrian network connecting the mountain to the neighborhood needs to be devised.','Can Sowol-ro function as a green connector rather than a mere through-road?']},stakeholders:{ko:[{role:'보행·등산 이용자',desc:'남산공원 접근 수요.'},{role:'서울시 (남산 르네상스)',desc:'소월로 보행화·녹지축 연결 정책 수립 주체.'},{role:'인근 건물주',desc:'녹지 접면부 지가 상승 기대.'}],de:[{role:'Fußgänger / Wanderer',desc:'Nachfrage nach Namsan-Zugang.'},{role:'Stadt Seoul',desc:'Zuständig für Fußgängerumgestaltung.'},{role:'Anliegende Eigentümer',desc:'Erwarten Wertsteigerung.'}],en:[{role:'Pedestrians / hikers',desc:'Demand Namsan access.'},{role:'Seoul City (Namsan Renaissance)',desc:'Policy authority for Sowol-ro pedestrianization.'},{role:'Adjacent property owners',desc:'Expect value gains.'}]},quote:'"차량 통행과 보행 경험, 경관 향유 사이의 긴장이 가장 선명하게 드러나는 구간 — 그리고 남산-용산공원 녹지축의 핵심 고리."'},
 {id:'spot4',num:4,ko:'녹사평대로 & 용산공원 접면부',de:'Noksapyeong-daero & Yongsan-Park Randzone',en:'Noksapyeong-daero & Yongsan Park Interface',sub:{ko:'공원-도시 전이 공간과 생태 연결',de:'Park-Stadt-Übergang & Ökologische Vernetzung',en:'Park-City Transition & Ecological Connectivity'},tags:{ko:['대규모 공원','녹지-도시 접면','생태 연결','차로 다이어트'],de:['Großpark','Grünraum-Stadt-Interface','Ökologische Vernetzung','Straßenraumreduzierung'],en:['Large-scale Park','Green-Urban Interface','Ecological Connectivity','Road Diet']},bg:{ko:'녹사평역 일대는 향후 조성될 243만㎡ 규모의 용산공원과 기존 고밀 주거·상업지가 만나는 경계부다.',de:'Die Umgebung der Station Noksapyeong ist die Kontaktzone zwischen dem entstehenden Yongsan-Park (2,43 Mio. m²) und bestehenden Gebieten.',en:'The Noksapyeong Station area is where the emerging 2.43 million m² Yongsan Park meets existing high-density residential and commercial areas.'},char:{ko:'지하 수십 미터 깊이까지 자연 채광이 쏟아지는 녹사평역의 거대한 중정(Atrium) 구조는 훌륭한 잠재력을 지녔다. 그러나 지상부는 왕복 6~10차선에 달하는 녹사평대로의 넓은 차폭과 복잡한 교차로가 지배적이다.',de:'Der gigantische Atrium der Station Noksapyeong hat großes Potenzial. Oberirdisch dominieren jedoch 6–10 Fahrspuren und komplexe Kreuzungen.',en:'Noksapyeong Station\'s massive atrium has great potential. However, the surface is dominated by 6–10 lane roads and complex intersections.'},issues:{ko:['대규모 공원이 주변 도시 조직에 어떤 파급 효과를 미치는지가 핵심 논점이다.','고립된 지하 역사 인프라부터 공원으로 이어지는 입체적 보행 및 생태 연결 방안이 필요하다.','공원 조성에 따른 주변 부동산 가치 상승과 개발 압력을 관찰하고 대응해야 한다.','남산-용산공원-한강을 잇는 생태축 실현을 위한 전략적 연결 방안을 모색해야 한다.'],de:['Wie ein Großpark die umliegende Stadtstruktur transformiert, ist die Kernfrage.','Integrierte Fußgänger- und Grünraumstrategie ist nötig.','Steigende Grundstückswerte müssen beobachtet werden.','Strategie zur Realisierung der Ökologieachse muss entwickelt werden.'],en:['How a large-scale park transforms surrounding urban fabric is the core question.','An integrated pedestrian and ecological strategy is needed.','Rising property values and development pressure must be managed.','Strategies for realizing the city-scale ecological axis need to be developed.']},stakeholders:{ko:[{role:'인근 주거·상업 건물주',desc:'공원 개방에 따른 지가 상승 기대.'},{role:'서울시 / 국토부',desc:'용산공원 조성 주체.'},{role:'환경·시민단체',desc:'공원의 생태적 기능 유지 촉구.'}],de:[{role:'Anliegende Eigentümer',desc:'Erwarten Wertsteigerung.'},{role:'Stadt Seoul / Ministerium',desc:'Träger der Parkentwicklung.'},{role:'Umwelt- und Bürgergruppen',desc:'Fordern Erhalt der Ökologie.'}],en:[{role:'Adjacent property owners',desc:'Expect value gains from park proximity.'},{role:'Seoul City / Ministry of Land',desc:'Park development authority.'},{role:'Environmental / civic groups',desc:'Demand preservation of ecological function.'}]},quote:'"닫힌 담장과 차량 중심의 경계를 유기적으로 스며드는 다공성 공간으로 어떻게 재설계할 것인가 — 현재 진행형인 도시 변화의 최전선."'},
 {id:'spot5',num:5,ko:'경리단길 & 이태원로',de:'Gyeongnidan-gil & Itaewon-ro',en:'Gyeongnidan-gil & Itaewon-ro',sub:{ko:'자생적 상업 가로의 생애주기와 회복력',de:'Lebenszyklus der organischen Geschäftsstraße & Resilienz',en:'Life Cycle of Organic Commercial Streets & Resilience'},tags:{ko:['소필지 상업가로','젠트리피케이션 이후','도시 형태','재난 후 회복'],de:['Kleinteilige Geschäftsstraße','Post-Gentrifizierung','Stadtmorphologie','Post-Katastrophe-Resilienz'],en:['Small-lot Commercial Street','Post-gentrification','Urban Morphology','Post-disaster Recovery']},bg:{ko:'경리단길은 인근 군부대와 외국인 거주자를 배경으로 형성된 골목 상권에서 출발해 2010년대 중반 급격한 상업화를 겪었으나, 이후 젠트리피케이션의 직격탄을 맞으며 현재는 공실화와 업종 전환이 진행 중이다. 이태원로 일대는 2022년 이태원 참사 이후 상권이 크게 위축되었으나, 2024~2025년을 거치며 부분적 회복세를 보이고 있다.',de:'Gyeongnidan-gil erlebt nach einem Gentrifizierungsboom nun Leerstand. Itaewon-ro zeigt seit 2024–25 teilweise Erholung nach dem Unglück 2022.',en:'Gyeongnidan-gil is in post-gentrification decline. Itaewon-ro shows partial recovery from 2024–25 after the 2022 tragedy.'},char:{ko:'도로를 경계로 필지 규모와 건물 유형이 급변하는 구간이 많아, 도시 형태학적 분석의 좋은 대상이다.',de:'Zahlreiche Abschnitte mit abruptem Parzellen- und Gebäudetypenwechsel machen den Ort ideal für Stadtmorphologieanalysen.',en:'Many sections with abrupt changes in lot scale and building type make this ideal for urban morphology analysis.'},issues:{ko:['젠트리피케이션의 사이클을 거쳐 쇠퇴를 겪고 있는 상업 가로의 물리적 환경을 어떻게 읽을 것인지가 논점이다.','수직적 혼합 용도가 밀집한 협소 가로와 경사지에서 보행자 흐름의 분산과 공공 안전 확보가 과제다.','이태원 참사 이후 상권 회복 과정에서 공간 설계가 어떤 역할을 할 수 있는지가 핵심 쟁점이다.','경리단길과 이태원로라는 서로 다른 단계에 놓인 두 가로를 비교하며 도시 상업 가로의 생애 주기를 탐색할 수 있다.'],de:['Wie liest man die physische Umgebung einer durch Gentrifizierung geschwächten Geschäftsstraße?','Fußgängersicherheit in engen Straßen ist zu gewährleisten.','Welche Rolle kann räumliches Design im Post-Katastrophen-Erholungsprozess spielen?','Vergleich beider Straßen ermöglicht Einblicke in Lebenszyklen.'],en:['How to read the physical environment of a commercial street in gentrification decline is the key question.','Ensuring pedestrian safety in narrow sloped streets needs examination.','What role spatial design can play in post-disaster recovery is a central issue.','Comparing the two streets enables exploration of commercial street life cycles.']},stakeholders:{ko:[{role:'소규모 자영업자',desc:'임대료 부담 및 프랜차이즈 대비 경쟁 열위.'},{role:'이태원 상인연합',desc:'상권 회복 및 이미지 개선 캠페인 추진.'},{role:'외국인 거주·방문객',desc:'이태원 상권의 핵심 수요층.'}],de:[{role:'Kleingewerbetreibende',desc:'Mietlastdruck.'},{role:'Itaewon Händlerverband',desc:'Kampagnen zur Geschäftsbelebung.'},{role:'Ausländische Bewohner / Besucher',desc:'Kernnachfrage.'}],en:[{role:'Small business operators',desc:'High rent burden vs. franchises.'},{role:'Itaewon Merchants Association',desc:'Pursuing recovery and image improvement.'},{role:'Foreign residents / visitors',desc:'Core demand base.'}]},quote:'"자생적 상업 가로의 생애 주기와 물리적 환경 사이의 관계를 두 가로의 비교를 통해 다각도로 탐색할 수 있는 현장."'},
];

function renderSpot(s){
  const prev=SPOTS[SPOTS.indexOf(s)-1]||null, next=SPOTS[SPOTS.indexOf(s)+1]||null;
  const SD={
    ko:{bg:'형성 배경',char:'공간 특성',iss:'주요 쟁점',sh:'이해관계자',act:'주체',role:'역할 및 현황',all:'전체 목록'},
    de:{bg:'Historischer Hintergrund',char:'Räumliche Charakteristik',iss:'Kernprobleme',sh:'Akteure',act:'Akteur',role:'Rolle & Status',all:'Alle Spots'},
    en:{bg:'Historical Background',char:'Spatial Character',iss:'Key Issues',sh:'Stakeholders',act:'Actor',role:'Role & Status',all:'All Spots'}
  }[LANG];
  const crumbSite={ko:'대상지',de:'Entwurfsgebiet',en:'Design Site'}[LANG];
  return `
  <div style="border-bottom:2px solid #000;"><div class="spot-top"><div class="spot-top-inner">
      <div class="spot-badge">${s.num}</div>
      <div class="spot-main">${tl(s)}</div>
      <div class="spot-sub">${tl(s.sub)}</div>
      <div class="tag-row">${s.tags[LANG].map(t=>`<span class="spot-tag">${t}</span>`).join('')}</div>
  </div></div></div>
  <div class="spot-wrap">
    <div class="crumb">
      <span onclick="go('home')">Home</span><span class="crumb-sep"> / </span>
      <span onclick="go('site')">${crumbSite}</span><span class="crumb-sep"> / </span>
      <span>Spot ${s.num}</span>
    </div>
    <div class="two-col">
      <div class="cbox">
        <div class="clabel">${SD.bg}</div><p class="btext">${s.bg[LANG]||s.bg.en}</p>
        <div class="clabel" style="margin-top:18px">${SD.char}</div><p class="btext">${s.char[LANG]||s.char.en}</p>
        <div class="quote">${s.quote}</div>
      </div>
      <div class="cbox">
        <div class="clabel">${SD.iss}</div>
        <ul class="ilist">${(s.issues[LANG]||s.issues.en).map(i=>`<li class="iitem"><div class="idot"></div><div>${i}</div></li>`).join('')}</ul>
      </div>
    </div>
    <div class="cbox-full">
      <div class="clabel">${SD.sh}</div>
      <table class="shtable">
        <thead><tr><th>${SD.act}</th><th>${SD.role}</th></tr></thead>
        <tbody>${(s.stakeholders[LANG]||s.stakeholders.en).map(sh=>`<tr><td><span class="sh-role">${sh.role}</span></td><td>${sh.desc}</td></tr>`).join('')}</tbody>
      </table>
    </div>
    <div class="spot-nav">
      <button class="snbtn${!prev?' dim':''}" onclick="${prev?`go('${prev.id}')`:''}"">← ${prev?`Spot ${prev.num} · ${tl(prev)}`:''}</button>
      <span class="sncenter" onclick="go('site')">${SD.all}</span>
      <button class="snbtn${!next?' dim':''}" onclick="${next?`go('${next.id}')`:''}"" >${next?`Spot ${next.num} · ${tl(next)}`:''} →</button>
    </div>
  </div>`;
}

  const L={

  const rows=GLOSS.map(cat=>`<tr class="cat-row"><td colspan="4">${tl(cat.cat)}</td></tr>${cat.terms.map(term=>`<tr><td><span class="g-ko">${term.ko}</span></td><td><span class="g-de">${term.de}</span></td><td><span class="g-en">${term.en}</span></td><td><span class="g-note">${tl(term.note)}</span></td></tr>`).join('')}`).join('');

function renderSched(){
  const SL={
    ko:{label:'SNU × TU Wien — April 2026',h1:'전체 일정',sub:'4/2–5 서울 도시답사 → 4/7–10 SNU×TUW 공동 워크샵',ph1:'서울 도시답사(TUW 일정)',amLbl:'오전',pmLbl:'오후'},
    de:{label:'SNU × TU Wien — April 2026',h1:'Vollständiges Programm',sub:'2.–5.4. Seoul Stadtexkursion → 7.–10.4. SNU×TUW Workshop',ph1:'Seoul Stadtexkursion',amLbl:'Vm',pmLbl:'Nm'},
    en:{label:'SNU × TU Wien — April 2026',h1:'Full Schedule',sub:'4/2–5 Seoul field trips → 4/7–10 SNU×TUW joint workshop',ph1:'Seoul field trips',amLbl:'AM',pmLbl:'PM'}
  }[LANG];
  const mkDetail=()=>SCHED_DETAIL.map((day,i)=>{
    const phaseSep=i===0?`<div class="sv-phase-label" style="margin-top:16px;"><span class="sv-pill">Phase 1</span>${SL.ph1}</div>`:i===4?`<div class="sv-phase-label" style="margin-top:40px;"><span class="sv-pill">Phase 2</span>SNU × TUW Workshop</div>`:'';
    const amH=day.blocks.find(b=>b.host&&typeof b.t==='string'&&parseInt(b.t)<13)?.host||null;
    const pmH=day.blocks.find(b=>b.host&&typeof b.t==='string'&&parseInt(b.t)>=13)?.host||null;
    const hostSegs=[
      amH?`<span class="dv-host-seg"><span class="dv-host-lbl">${SL.amLbl}</span><span class="dv-host-name">${amH}</span></span>`:'',
      pmH?`<span class="dv-host-seg"><span class="dv-host-lbl">${SL.pmLbl}</span><span class="dv-host-name">${pmH}</span></span>`:'',
    ].filter(Boolean).join('');
    return phaseSep+`<div class="dv-day"><div class="dv-head">
      <span class="dv-date">${tl(day.d)}</span>
      <span class="dv-room">${day.room}</span>
      <span class="dv-phase-tag">${tl(day.phase)}</span>
      ${hostSegs?`<div class="dv-host-row">${hostSegs}</div>`:''}
    </div>${day.blocks.map(b=>`<div class="dv-block${b.type==='break'?' dv-break':''}"><div class="dv-time">${typeof b.t==='object'?tl(b.t):b.t}</div><div class="dv-info"><div class="dv-name">${b.type!=='break'?etag(b.type):''}${tl(b)}</div></div></div>`).join('')}</div>`;
  }).join('');
  return `<div class="dark-hero"><div class="hero-label">${SL.label}</div><h1>${SL.h1}</h1><p style="font-size:13px;color:rgba(255,255,255,.45);font-weight:300;margin-top:10px;">${SL.sub}</p></div>
  <div class="sch-content">
    <div style="padding-top:4px;">${mkDetail()}</div>
  </div>`;
}

    de:{label:'Staff',h1:'Staff-Werkzeuge',loginTitle:'Staff-Zugang',loginSub:'Staff-Passwort eingeben',loginBtn:'Eintreten',loginErr:'Falsches Passwort.',statusMsg:'Staff-Modus aktiv',logoutBtn:'Abmelden',noticeTitle:'Ankündigungen verwalten',noticePH:'Ankündigung eingeben...',noticeBtn:'Veröffentlichen',clTitle:'Checkliste',note:'※ Die Checkliste wird in Echtzeit synchronisiert (sichtbar auf allen Geräten).'},

  return `<div class="dark-hero"><div class="hero-label">${L.label}</div><h1>${L.h1}</h1></div>
  <div class="staff-wrap">
    <div class="staff-status-bar"><span>🔓 ${L.statusMsg}</span><button class="staff-logout-btn" onclick="staffDoLogout()">${L.logoutBtn}</button></div>

      <div class="staff-sec-hd">${L.clTitle}</div>

function go(id){ location.hash=id; }
function updateNav(){
  ['home','site','sched','gloss','staff'].forEach(k=>{
    const el=document.getElementById('dm-'+k);
    if(el) el.textContent=NAV[k][LANG]||NAV[k].en;
  });
  document.getElementById('f-right').textContent=FOOTER[LANG]||FOOTER.en;
}
function toggleMenu(){ document.getElementById('drop-menu').classList.toggle('open'); }
function menuGo(id){ document.getElementById('drop-menu').classList.remove('open'); go(id); }
document.addEventListener('click',function(e){
  const menu=document.getElementById('drop-menu');
  const btn=document.getElementById('ham-btn');
  if(menu&&btn&&!menu.contains(e.target)&&!btn.contains(e.target)) menu.classList.remove('open');
});
function setLang(l){
  LANG=l;
  ['ko','de','en'].forEach(x=>document.getElementById('lb-'+x).classList.toggle('on',x===l));
  document.documentElement.lang=l;
  localStorage.setItem('snu-tuw-lang',l);
  updateNav();
  render();
}
function render(){
  const hash=location.hash.replace('#','')||'home';
  const spot=SPOTS.find(s=>s.id===hash);
  let html='';
  if(hash==='home') html=renderHome();
  else if(hash==='site') html=renderSite();
  else if(hash==='gloss') html=renderGloss();
  else if(hash==='sched') html=renderSched();
  else if(hash==='staff') html=renderStaff();
  else if(spot) html=renderSpot(spot);
  else html=renderHome();
  document.getElementById('app').innerHTML=html;
  ['home','site','sched','gloss','staff'].forEach(k=>{
    const el=document.getElementById('dm-'+k);
    if(el) el.classList.toggle('on', hash===k || (k==='site' && !!spot));
  });
  const ctL={
    title:{ko:'연락처',de:'Kontakt',en:'Contact'},
    r1:{ko:'워크샵 코디네이터 (SNU)',de:'Workshop-Koordinatorin (SNU)',en:'Workshop Coordinator (SNU)'},
    r2:{ko:'워크샵 코디네이터 (TUW)',de:'Workshop-Koordinatorin (TUW)',en:'Workshop Coordinator (TUW)'},
    r3:{ko:'성수 투어',de:'Seongsu-Tour',en:'Seongsu Tour'},
  };
  document.getElementById('contact-title').textContent=ctL.title[LANG];
  document.getElementById('ct-role1').textContent=ctL.r1[LANG];
  document.getElementById('ct-role2').textContent=ctL.r2[LANG];
  document.getElementById('ct-role3').textContent=ctL.r3[LANG];
  window.scrollTo(0,0);
}
window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', function(){
  const saved = localStorage.getItem('snu-tuw-lang');
  if(saved && ['ko','de','en'].includes(saved)){
    setLang(saved);
  } else {
    updateNav();
    render();
  }
});
</script>
