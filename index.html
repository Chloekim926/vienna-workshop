<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vienna Workshop 2025 · 남산 일대 현장 답사</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#FAFAF8; --white:#FFFFFF; --ink:#1A1916; --ink2:#4A4845; --ink3:#9A9895;
  --rule:#E8E5E0; --rule2:#F0EDE8;
  --c1:#B5704A; --c2:#5B7FA6; --c3:#7A9E7E; --c4:#A07EB8; --c5:#7EB8A0;
  --c6:#C87E8A; --c7:#8A7EB8; --c8:#B8A07E; --c9:#5B9E8A; --c10:#C85A5A;
  --dark:#141418;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--ink);font-family:'Noto Sans KR',sans-serif;font-weight:300;font-size:14px;line-height:1.7;min-height:100vh;}
a{text-decoration:none;color:inherit;}

/* NAV */
nav{background:var(--white);border-bottom:1px solid var(--rule);position:sticky;top:0;z-index:200;height:52px;display:flex;align-items:center;padding:0 40px;gap:0;justify-content:space-between;}
.nav-logo{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;color:var(--ink2);text-transform:uppercase;cursor:pointer;}
.nav-logo:hover{color:var(--ink);}
.nav-links{display:flex;align-items:center;gap:2px;}
.nav-link{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;padding:5px 12px;border-radius:4px;cursor:pointer;color:var(--ink3);transition:all .15s;text-transform:uppercase;}
.nav-link:hover{background:var(--bg);color:var(--ink2);}
.nav-link.active{background:var(--ink);color:#fff;}
.nav-badge{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;color:var(--ink3);border:1px solid var(--rule);padding:3px 10px;border-radius:20px;}

/* PAGE WRAPPER */
.page{display:none;animation:fadeIn .35s ease both;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* HERO HOME */
.home-hero{background:var(--white);border-bottom:1px solid var(--rule);padding:64px 40px 48px;}
.home-hero h1{font-family:'DM Serif Display',serif;font-size:clamp(36px,5vw,60px);font-weight:400;line-height:1.1;color:var(--ink);margin-bottom:12px;}
.home-hero h1 em{font-style:italic;color:var(--ink3);}
.home-hero-sub{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:28px;}
.home-hero-desc{font-size:14px;line-height:1.85;color:var(--ink2);max-width:560px;}

/* STATS */
.stats-row{display:flex;gap:0;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);background:var(--white);}
.stat-cell{flex:1;padding:20px 24px;border-right:1px solid var(--rule);}
.stat-cell:last-child{border-right:none;}
.stat-n{font-family:'DM Serif Display',serif;font-size:26px;color:var(--ink);margin-bottom:3px;}
.stat-l{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);}

/* ROUTE OVERVIEW GRID */
.section-wrap{max-width:1000px;margin:0 auto;padding:48px 40px 80px;}
.section-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;}
.section-title{font-family:'DM Serif Display',serif;font-size:28px;color:var(--ink);margin-bottom:32px;}

.spots-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.spot-card{background:var(--white);border:1px solid var(--rule);border-radius:8px;overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .2s;}
.spot-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.08);transform:translateY(-2px);}
.spot-card-img{width:100%;height:160px;object-fit:cover;display:block;background:var(--rule2);}
.spot-card-img-placeholder{width:100%;height:160px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:28px;color:#fff;}
.spot-card-body{padding:16px 20px;}
.spot-card-num{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.spot-card-ko{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:3px;}
.spot-card-en{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.04em;color:var(--ink3);margin-bottom:10px;}
.spot-card-tags{display:flex;flex-wrap:wrap;gap:4px;}
.stag{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.05em;padding:2px 7px;border-radius:3px;background:var(--bg);color:var(--ink3);border:1px solid var(--rule);}
.spot-card-arrow{float:right;font-size:12px;color:var(--ink3);margin-top:-2px;}

/* SPOT DETAIL PAGE */
.spot-hero{position:relative;height:340px;overflow:hidden;}
.spot-hero img{width:100%;height:100%;object-fit:cover;display:block;}
.spot-hero-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.spot-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.6) 0%,transparent 50%);}
.spot-hero-content{position:absolute;bottom:0;left:0;right:0;padding:28px 40px;}
.spot-hero-num{display:inline-flex;width:40px;height:40px;border-radius:50%;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:18px;color:#fff;margin-bottom:10px;}
.spot-hero-ko{font-family:'DM Serif Display',serif;font-size:28px;color:#fff;margin-bottom:4px;}
.spot-hero-en{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.08em;color:rgba(255,255,255,.7);}

.spot-wrap{max-width:960px;margin:0 auto;padding:40px 40px 80px;}

/* BREADCRUMB */
.breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:28px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;color:var(--ink3);}
.breadcrumb a{cursor:pointer;}
.breadcrumb a:hover{color:var(--ink);}
.breadcrumb-sep{color:var(--rule);}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px;}
.col-box{background:var(--white);border:1px solid var(--rule);border-radius:8px;padding:24px;}
.col-box-full{background:var(--white);border:1px solid var(--rule);border-radius:8px;padding:24px;margin-bottom:24px;}
.col-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);padding-bottom:10px;border-bottom:1px solid var(--rule);margin-bottom:14px;}

/* BODY TEXT */
.body-text{font-size:13.5px;line-height:1.9;color:var(--ink2);}
.body-text + .body-text{margin-top:12px;}

/* ISSUE LIST */
.issue-list{list-style:none;display:flex;flex-direction:column;gap:10px;}
.issue-item{display:flex;gap:10px;font-size:13px;color:var(--ink2);line-height:1.65;}
.idot{width:7px;height:7px;border-radius:50%;margin-top:6px;flex-shrink:0;}
.issue-en{font-size:11.5px;color:var(--ink3);margin-top:3px;line-height:1.5;}

/* STAKEHOLDER TABLE */
.sh-table{width:100%;border-collapse:collapse;}
.sh-table th{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);text-align:left;padding:8px 12px;border-bottom:1px solid var(--rule);background:var(--bg);}
.sh-table td{padding:10px 12px;border-bottom:1px solid var(--rule2);font-size:12.5px;color:var(--ink2);line-height:1.6;vertical-align:top;}
.sh-table tr:last-child td{border-bottom:none;}
.sh-role{font-weight:700;color:var(--ink);font-size:12px;}

/* STAT BOXES */
.stat-boxes{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.stat-box{background:var(--bg);border:1px solid var(--rule);border-radius:6px;padding:12px 16px;flex:1;min-width:120px;}
.stat-box-n{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:2px;}
.stat-box-l{font-size:11px;color:var(--ink3);line-height:1.4;}

/* QUOTE */
.eng-quote{font-family:'DM Serif Display',serif;font-style:italic;font-size:14px;line-height:1.75;color:var(--ink3);padding:16px 20px;border-left:3px solid var(--rule);background:var(--bg);border-radius:0 6px 6px 0;margin-top:20px;}

/* NAV ARROWS */
.spot-nav{display:flex;justify-content:space-between;margin-top:40px;padding-top:24px;border-top:1px solid var(--rule);}
.spot-nav-btn{display:flex;align-items:center;gap:10px;padding:12px 20px;border:1px solid var(--rule);border-radius:6px;cursor:pointer;background:var(--white);transition:all .15s;font-size:13px;color:var(--ink2);}
.spot-nav-btn:hover{background:var(--bg);border-color:var(--ink3);}
.spot-nav-btn.disabled{opacity:.3;pointer-events:none;}

/* GLOSSARY */
.gloss-table{width:100%;border-collapse:collapse;margin-bottom:32px;}
.gloss-table th{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);text-align:left;padding:8px 16px;border-bottom:2px solid var(--rule);background:var(--bg);}
.gloss-table td{padding:11px 16px;border-bottom:1px solid var(--rule2);font-size:13px;line-height:1.55;vertical-align:top;}
.gloss-table tr:hover td{background:var(--rule2);}
.gloss-ko{font-weight:700;color:var(--ink);}
.gloss-en{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.04em;}
.gloss-note{color:var(--ink3);font-size:12px;}
.cat-header-row td{background:var(--dark)!important;color:#E8E4DC;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;padding:8px 16px;}

/* PART 2 INTRO */
.part2-hero{background:var(--dark);padding:52px 40px 40px;border-bottom:1px solid #2A2A32;}
.part2-hero h1{font-family:'DM Serif Display',serif;font-size:clamp(28px,4vw,44px);color:#E8E4DC;margin-bottom:8px;}
.part2-hero h1 em{font-style:italic;color:#666;}
.part2-hero-sub{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;color:#555;text-transform:uppercase;}

/* FOOTER */
footer{border-top:1px solid var(--rule);background:var(--white);padding:20px 40px;display:flex;justify-content:space-between;align-items:center;}
footer .f1{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;color:var(--ink3);text-transform:uppercase;}
footer .f2{font-family:'DM Serif Display',serif;font-style:italic;font-size:13px;color:var(--ink3);}

/* BACK BUTTON */
.back-btn{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);cursor:pointer;margin-bottom:20px;padding:6px 0;}
.back-btn:hover{color:var(--ink);}

@media(max-width:720px){
  nav{padding:0 20px;}
  .home-hero,.section-wrap,.spot-wrap{padding-left:20px;padding-right:20px;}
  .spots-grid,.two-col{grid-template-columns:1fr;}
  .stats-row{flex-wrap:wrap;}
  .stat-cell{flex:0 0 50%;border-bottom:1px solid var(--rule);}
  .spot-hero-content{padding:20px;}
  footer{padding:16px 20px;flex-direction:column;gap:6px;text-align:center;}
  .nav-links{display:none;}
}
</style>
</head>
<body>

<nav>
  <span class="nav-logo" onclick="go('home')">Vienna Workshop 2025</span>
  <div class="nav-links">
    <span class="nav-link" id="nl-home" onclick="go('home')">Home</span>
    <span class="nav-link" id="nl-part1" onclick="go('part1')">현장 루트</span>
    <span class="nav-link" id="nl-part2" onclick="go('part2')">용어집</span>
  </div>
  <span class="nav-badge">Seoul · Namsan</span>
</nav>

<div id="app"></div>

<footer>
  <span class="f1">Seoul National University · Urban Planning · 2025</span>
  <span class="f2">Vienna Workshop — Namsan Site Analysis</span>
</footer>

<script>
const COLORS = ['--c1','--c2','--c3','--c4','--c5','--c6','--c7','--c8','--c9','--c10'];
const HEX    = ['#B5704A','#5B7FA6','#7A9E7E','#A07EB8','#7EB8A0','#C87E8A','#8A7EB8','#B8A07E','#5B9E8A','#C85A5A'];

// Unsplash photo IDs: curated Seoul/Korea urban scenes
const PHOTOS = [
  'photo-1601577576601-18e15af02ca6', // Seoul alley hillside
  'photo-1558618666-fcd25c85cd64', // Korean street road
  'photo-1578637387939-43c525550085', // Seoul market alley
  'photo-1517154421773-0529f29ea451', // Seoul night view
  'photo-1570789210967-2cac24afeb00', // Korea urban building
  'photo-1541917615-c8e2e31e5b4c', // Korean street night
  'photo-1565962034476-0b9c3e6a4d51', // Seoul urban fabric
  'photo-1555396273-367ea4eb4db5', // Street restaurant
  'photo-1519817914152-22d216bb9170', // Park road
  'photo-1545569341-9eb8b30979d9', // Seoul skyline hotel
];

const SPOTS = [
  {
    id:'spot1', num:1, color:HEX[0],
    ko:'후암동 경사 주거지',
    en:'Huam-dong Hillside Residential Area',
    tags:['Urban Morphology','Hillside Development','Lot Pattern','Redevelopment'],
    photo: PHOTOS[0],
    char_ko:'남산 북사면에 형성된 저층 경사 주거지. 평균 경사 15~25도의 구릉지에 불규칙한 소규모 필지와 막다른 골목이 얽혀 있으며 차량 접근이 극도로 제한된다. 일제강점기 삼판통(三坂通) 일본인 고급 주택단지로 개발되었다가 해방 후 피란민 등이 정착하며 현재의 저층 고밀 조직으로 변화하였다.',
    char_en:'A low-rise hillside residential area on the northern slope of Namsan. Irregular small-scale lots and dead-end alleys on a slope averaging 15–25°, with extremely limited vehicle access. Originally an upscale Japanese residential district during the colonial period, it was subsequently settled by refugees and returnees, transforming into the current dense low-rise fabric.',
    update:'2024년 9월 서울시 도시·건축공동위원회에서 후암동 특별계획구역 재정비안 수정가결. 32만 1,281㎡에 최고 100m(주거 33층) 개발 허용. 한강대로 인접 구역을 준주거지역으로 상향, 폭 20m 공공 보행통로 및 남산-용산공원 녹지축 연결 계획 포함.',
    update_en:'In September 2024, Seoul approved the Special Planning Zone revision for Huam-dong. Development up to 100m (33 floors) permitted over 321,281㎡. Adjacent areas rezoned to semi-residential, with a 20m public pedestrian corridor and planned Namsan–Yongsan Park green axis.',
    stats:[{n:'32만㎡',l:'특별계획구역 대상'},{n:'100m',l:'허용 최고 높이'},{n:'2024',l:'지구단위계획 수정가결'}],
    issues:[
      {ko:'보행 접근성 단절 — 급경사로 고령자·장애인 이동 불가 구간 다수. 계단만 있는 필지 접근로 존재.',en:'Pedestrian access severed — many sections impassable for elderly/disabled. Some lots accessible only via stairways.'},
      {ko:'기반시설 노후화 — 상하수도·전기 매설 40년 이상, 소방차 진입 불가 골목 비율 높음.',en:'Aging infrastructure — 40+ year-old utility lines in many sections; high proportion of alleys inaccessible to fire trucks.'},
      {ko:'개발 압력 vs 원주민 이주 — 특별계획구역 지정으로 지가 상승. 장기 거주 고령 가구 재정착 가능성 불투명.',en:'Development pressure vs. displacement — land values rising post-designation. Uncertain resettlement prospects for long-term elderly households.'},
      {ko:'공공기여 설계 — 보행통로·공원 기부채납의 실효성. 녹지축 연결 실현 가능성.',en:'Design of public contribution — effectiveness of pedestrian corridor dedications; feasibility of realizing the green axis.'},
    ],
    stakeholders:[
      {role:'장기 거주 원주민 (Long-term residents)',desc:'30~40년 이상 거주 고령 가구 다수. 재개발 시 임대주택 배정 대상이나 인근 재정착 가능성 낮음.'},
      {role:'서울시 / 용산구',desc:'지구단위계획 수립 주체. 2024년 재정비안으로 개발 촉진 기조로 전환.'},
      {role:'민간 시행사 / 조합 (Developers)',desc:'특별계획구역 내 정비사업 추진 주체. 공공기여 협상의 핵심 당사자.'},
    ],
    quote:'"Organically grown hillside residential fabric — irregular lot pattern, poor accessibility, and aging infrastructure make this a textbook case for urban morphology analysis."',
  },
  {
    id:'spot2', num:2, color:HEX[1],
    ko:'두텁바위로 — 경사 간선도로',
    en:'Duteopbawi-ro: Steep Arterial Road',
    tags:['Road Diet','Street Hierarchy','Pedestrian Safety','Last Mile'],
    photo: PHOTOS[1],
    char_ko:'남산에서 용산 방향으로 내려오는 대표 경사 간선도로. 왕복 2~4차로로 차량 통행 우선 설계. 보도 폭이 협소하거나 단절된 구간이 있으며 경사로 인해 보행자·자전거 이용이 사실상 불가능한 구간을 포함한다. 이면도로 접속부에서 시야 확보가 안 되어 사고 위험 지점 다수.',
    char_en:'The representative steep arterial road descending from Namsan toward Yongsan. Designed for 2–4 lanes of vehicular priority with narrow or broken sidewalks. Steep gradient makes cycling and pedestrian use practically impossible in some sections. Multiple accident-prone junctions with residential side streets.',
    stats:[{n:'2~4',l:'차선 수 (왕복)'},{n:'Road Diet',l:'적용 검토 구간'}],
    issues:[
      {ko:'보행-차량 갈등 — 경사 구간 차량 속도 증가로 횡단보도 사고 위험. 신호 없는 횡단지점 다수.',en:'Pedestrian-vehicle conflict — vehicle speeds increase downhill, raising crosswalk risks. Many unsignalized crossing points.'},
      {ko:'Road Diet 가능성 — 차로 축소 및 PM 전용 구간 설치 검토 대상. 경사로 인한 자전거 이용 한계 존재.',en:'Road diet potential — candidate for lane reduction and micro-mobility lanes, though steep gradient limits cycling viability.'},
      {ko:'생활권 단절 — 두텁바위로가 후암동-해방촌 사이의 물리적 장벽 역할. 보행 연속성 미확보.',en:'Neighborhood severance — acts as a physical barrier between Huam-dong and Haebangchon, disrupting pedestrian continuity.'},
    ],
    stakeholders:[
      {role:'보행 주민 / 고령자',desc:'급경사 구간 낙상 위험 및 대중교통 접근 어려움 호소.'},
      {role:'배달·택배 근로자',desc:'차량 진입 불가 구간 도보 배달 비중 높음. 경사 이동 노동 강도 문제.'},
    ],
    quote:'"A steep arterial road designed for vehicles — a prime candidate for road diet and pedestrianization discussion."',
  },
  {
    id:'spot3', num:3, color:HEX[2],
    ko:'해방촌 신흥시장 & 골목',
    en:'Haebangchon — Spontaneous Mixed-use Community',
    tags:['Spontaneous Mixed-use','Historic Settlement','Urban Regeneration','Multicultural'],

}

// ── ROUTER ───────────────────────────────────────────────

function go(id){
  location.hash = id;
}

function render(){
  const hash = location.hash.replace('#','') || 'home';
  const app = document.getElementById('app');

  // Find spot
  const spot = SPOTS.find(s=>s.id===hash);

  let html = '';
  if(hash==='home')       html = renderHome();
  else if(hash==='part1') html = renderPart1();
  else if(hash==='part2') html = renderPart2();
  else if(spot)           html = renderSpot(spot);
  else                    html = renderHome();

  app.innerHTML = `<div class="page active">${html}</div>`;
  window.scrollTo(0,0);

  // Update nav
  ['home','part1','part2'].forEach(id=>{
    const el = document.getElementById('nl-'+id);
    if(el) el.classList.toggle('active',
      hash===id || (id==='part1' && spot));
  });
}

window.addEventListener('hashchange', render);
render();
</script>
