.contact-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#d0d0d0;border:1px solid #d0d0d0;}

.contact-name{font-size:12px;font-weight:700;color:#000;margin-bottom:4px;}

<script>
let LANG = 'ko';

const GMAP_URL = "https://www.google.com/maps/d/u/0/edit?mid=1GBxgoZf-f3D2zfND4zIjyvGGmdyybnc&ll=37.542760030351715%2C126.98602362673266&z=16";
  
const NAV = {
  home:  {ko:'홈',          de:'Start',           en:'Home'},
  site:  {ko:'대상지',      de:'Entwurfsgebiet',  en:'Design Site'},
  gloss: {ko:'용어집',      de:'Glossar',         en:'Glossary'},
  sched: {ko:'일정',        de:'Programm',        en:'Schedule'},
};
const FOOTER = {ko:'SNU-TUW 2026 Workshop',de:'SNU-TUW 2026 Workshop',en:'SNU-TUW 2026 Workshop'};

function tl(o){ if(!o) return ''; return o[LANG] || o.en || ''; }
function etag(type){
  const labels={intro:'intro',field:'field',work:'work',pres:'final',free:'free'};
  if(!type||type==='break') return '';
  return `<span class="etag etag-${type}">${labels[type]||type}</span>`;
}

/* ── 5 SPOTS ── */
const SPOTS=[
 {id:'spot1',num:1,
  ko:'후암동 일대',de:'Huam-dong Gebiet',en:'Huam-dong District',
  sub:{ko:'경사 주거지와 역사적 도시 조직',de:'Hanglage & historisches Stadtgefüge',en:'Hillside Residential & Historic Urban Fabric'},
  tags:{
    ko:['도시 형태','구릉지 개발','역사 보존','재개발'],
    de:['Stadtmorphologie','Hangbebauung','Denkmalpflege','Stadtentwicklung'],
    en:['Urban Morphology','Hillside Development','Heritage Conservation','Redevelopment']},
  bg:{
    ko:'남산 북사면에 자리한 후암동 일대는 일제강점기 고급 주거지(삼판통)로 개발된 지역으로, 당시 조성된 적산가옥과 계획적 필지 구획의 흔적이 부분적으로 잔존해 있다. 해방과 전쟁을 거치며 피란민이 대거 정착하면서 기존의 격자 구조 위에 자연발생적인 소규모 필지 분할과 막다른 골목이 중첩되었고, 15~25도의 급경사 지형에 적응한 저층 고밀 주거지로 변화했다. 일제강점기의 도시 조직, 해방 이후 비공식 정착, 근대화 이후 점진적 개량이 켜켜이 쌓인 이 구역은 서울에서 도시 형성의 시간적 층위를 가장 복합적으로 읽을 수 있는 장소 중 하나다.',
    de:'Das Huam-dong-Gebiet am Nordhang des Namsan wurde in der japanischen Kolonialzeit als gehobenes Wohnviertel (Sampan-tong) angelegt. Nach 1945 siedelten sich Flüchtlinge an und überlagerten das ursprüngliche Raster mit organischen Kleinstparzellen und Sackgassen auf 15–25° Gefälle.',
    en:'Located on the northern slope of Namsan, Huam-dong was developed as an elite residential area (Sampan-tong) during the Japanese colonial period. Post-liberation refugees layered informal small-lot subdivisions and dead-end alleys onto the original grid, creating today\'s dense low-rise fabric on 15–25° slopes.'},
  char:{
    ko:'적산가옥이 남아 있는 골목, 경사에 순응한 불규칙한 필지 조직, 차량 접근이 불가능한 막다른 길이 공존하는 복합적 구조를 갖는다. 이 중 108계단과 계단 상단의 오거리는 구역 전체의 수직 보행을 지탱하는 핵심 결절점이다. 108계단은 차량 진입이 불가능한 상부 필지들을 하부 간선 도로와 연결하는 유일한 동선이며, 경사 구간의 엘리베이터와 함께 이동 약자를 포함한 주민들의 일상 생활을 지탱한다. 오거리는 계획된 적 없는 방식으로 광장 기능을 수행하는 공간으로, 보행자·마을버스·오토바이가 뒤엉키는 혼잡한 결절이자 이 동네의 사회적 중심이다.',
    de:'Gassen mit erhaltenen Kolonialvillen, unregelmäßige Parzellenstruktur und fahrzeugunzugängliche Sackgassen prägen das Quartier. Die 108 Stufen und die Fünfwegkreuzung an ihrer Spitze sind die zentralen Erschließungsknoten für den vertikalen Fußverkehr.',
    en:'Alleys with preserved Japanese colonial houses, irregular lot structures, and vehicle-inaccessible dead ends coexist in a complex spatial arrangement. The 108 Steps and the five-way junction at their top are the key nodes sustaining vertical pedestrian movement in the entire district.'},
  issues:{
    ko:['특별계획구역 재정비로 최고 100m 높이의 개발이 허용되면서 재개발 압력이 본격화되고 있다.','적산가옥과 비공식 골목 조직으로 구성된 역사 경관의 보존 여부가 핵심 쟁점이다.','재개발에 따른 원주민 이주와 커뮤니티 해체 문제가 제기된다.','급경사 지형에서 소방 접근·보행 안전·이동 약자 접근성 등 현대적 인프라 확보가 과제다.'],
    de:['Die Genehmigung für 100-m-Bebauung im Sonderbaugebiet erhöht den Entwicklungsdruck erheblich.','Erhalt der historischen Straßenzüge mit Kolonialvillen und informellen Gassen steht auf dem Spiel.','Verdrängung langjähriger Bewohner und Auflösung gewachsener Gemeinschaften drohen.','Sicherstellung moderner Infrastruktur (Feuerwehrzufahrt, Barrierefreiheit) im Steilgelände ist herausfordernd.'],
    en:['Special planning zone revision permits development up to 100m, intensifying redevelopment pressure.','Preservation of historic streetscapes with colonial houses and informal alley networks is a key issue.','Displacement of long-term residents and community dissolution are raised as central concerns.','Securing modern infrastructure (fire access, pedestrian safety, accessibility) on steep terrain is a major challenge.']},
  stakeholders:{
    ko:[{role:'장기 거주 원주민',desc:'30~40년 이상 거주 고령 가구. 재개발 시 임대주택 배정 대상이나 인근 재정착 가능성 낮음.'},{role:'서울시 / 용산구',desc:'지구단위계획 수립 주체. 2024년 재정비안으로 개발 촉진 기조 전환.'},{role:'민간 시행사 / 조합',desc:'특별계획구역 내 정비사업 추진 주체. 공공기여 협상의 핵심 당사자.'}],
    de:[{role:'Langjährige Bewohner',desc:'Ältere Haushalte (30–40+ Jahre); für Sozialwohnungen vorgesehen, lokale Umsiedlung kaum möglich.'},{role:'Stadt Seoul / Yongsan-gu',desc:'Planungsbehörde; 2024 auf Entwicklungsförderung umgeschwenkt.'},{role:'Privatentwickler / Genossenschaften',desc:'Umsetzungsträger im Sonderbaugebiet; Schlüsselpartner bei Beitragsverhandlungen.'}],
    en:[{role:'Long-term residents',desc:'Mostly elderly households (30–40+ years); eligible for public rental but local resettlement unlikely.'},{role:'Seoul City / Yongsan-gu',desc:'District unit plan authority; shifted to pro-development stance with 2024 revision.'},{role:'Developers / Associations',desc:'Implementing entities; key parties in public contribution negotiations.'}]},
  quote:'"서울에서 도시 형성의 시간적 층위를 가장 복합적으로 읽을 수 있는 장소 — 그리고 100m 개발 허용이 그 층위를 덮어쓸 수 있는 곳."'},

 {id:'spot2',num:2,
  ko:'해방촌 신흥시장 일대',de:'Sinheung-Markt Haebangchon',en:'Haebangchon Sinheung Market Area',
  sub:{ko:'자연발생적 혼합 용도와 도시재생',de:'Organische Nutzungsmischung & Stadterneuerung',en:'Spontaneous Mixed-use & Urban Regeneration'},
  tags:{
    ko:['자연발생 혼합용도','전통시장','도시재생','젠트리피케이션'],
    de:['Organische Nutzungsmischung','Traditioneller Markt','Stadterneuerung','Gentrifizierung'],
    en:['Spontaneous Mixed-use','Traditional Market','Urban Regeneration','Gentrification']},
  bg:{
    ko:'해방촌 신흥시장은 1945년 이후 피란민들이 남산 사면에 정착하며 삶의 터전으로 만든 자생적 시장에서 출발한다. 계획된 상업지구가 아니라 생존의 필요에 의해 형성된 공간인 만큼, 건물 구조와 골목의 배치가 불규칙하고 유기적이다. 2000년대 이후 노후화가 심화되면서 전면 철거 방식의 재개발이 논의되었으나, 결국 기존 골조와 공간 구조를 살리는 도시재생의 방법론을 택했다. 이후 오래된 콘크리트 구조물 안에 카페, 다국적 식당, 독립 서점, 게스트하우스 등이 들어서면서 현재와 같은 혼합적 풍경이 만들어졌다.',
    de:'Der Sinheung-Markt entstand nach 1945 als organischer Selbstversorgermarkt von Flüchtlingssiedlern. Nach Debatten über Totalabriss entschied man sich für Stadterneuerung — heute koexistieren Cafés, internationale Restaurants und Gästehäuser im alten Betongerüst.',
    en:'The Sinheung Market originated as a spontaneous survival market formed by refugees after 1945. Rather than demolition, urban regeneration preserved the existing structure — today cafés, multinational restaurants, and guesthouses coexist within the old concrete framework.'},
  char:{
    ko:'좁고 미로 같은 골목 조직, 낮은 층고와 작은 칸막이로 구성된 점포 구조, 그리고 시장 특유의 열린 동선 체계가 공간의 기본 성격을 이룬다. 2019년 도시재생 뉴딜 사업을 통해 바닥 포장, 간판 정비, 공용 시설 등 가로 환경이 일부 정비되었다. 그러나 이 사업이 오히려 외부에 해방촌을 발견하게 하는 계기가 되면서 임대료 상승과 젠트리피케이션 압력이 함께 심화되었다.',
    de:'Enge, labyrinthische Gassen, niedrige Deckenhöhen und kleinteilige Ladeneinheiten prägen das Raumgefüge. Das New-Deal-Programm 2019 verbesserte Bodenbelag und Beschilderung — rückte Haebangchon aber auch ins öffentliche Bewusstsein und löste Mietpreisauftrieb aus.',
    en:'Narrow maze-like alleys, low ceilings, and small shop units define the spatial character. The 2019 Urban Regeneration New Deal improved street surfaces and signage — but also brought Haebangchon to public attention, triggering rent increases and gentrification pressure.'},
  issues:{
    ko:['도시재생 사업이 물리적 환경을 개선하면서도 기존 커뮤니티를 밀어내는 구조적 문제를 어떻게 읽을 것인가.','기존 니트 공장 등 가내수공업자와 오랜 원주민이 점차 밀려나고 상업 시설만 남는 현상이 가속화되고 있다.','원주민·영세 상인과 새로운 유입자 사이의 공존 가능성 및 제도적 장치의 필요성이 핵심 논점이다.','좁고 불규칙한 기존 시장 골격을 유지하면서 보행 편의·소방 접근·안전 등 현대적 인프라를 어떻게 확충할 것인가.'],
    de:['Stadterneuerung verbessert die Umgebung, verdrängt aber gleichzeitig die gewachsene Gemeinschaft.','Heimindustrielle (Strickfabriken) und langjährige Bewohner werden schrittweise verdrängt.','Koexistenz von Alteingesessenen und Neuzugängen braucht räumliche und institutionelle Steuerungsinstrumente.','Erhalt des engen, unregelmäßigen Marktgefüges bei gleichzeitiger Modernisierung der Infrastruktur ist die Kernherausforderung.'],
    en:['Urban regeneration improving the physical environment while displacing the existing community is the core structural paradox.','Home-industry workers and long-term residents are being gradually pushed out as commercial uses dominate.','Coexistence between original communities and newcomers requires spatial and institutional mechanisms.','Maintaining the narrow irregular market structure while upgrading fire access, safety, and pedestrian amenity is the key challenge.']},
  stakeholders:{
    ko:[{role:'신흥시장 상인',desc:'고령 상인 중심. 시장 현대화 및 후계자 부재 문제.'},{role:'가내수공업자 / 원주민',desc:'임대료 상승으로 이탈 압력. 재생 사업 수혜에서 소외.'},{role:'카페·게스트하우스 사업자',desc:'재생 이후 유입된 새 상업 세력. 임대료 상승의 수혜자이자 동인.'}],
    de:[{role:'Sinheung-Markthändler',desc:'Überwiegend ältere Generation; Modernisierungsdruck und Nachfolgeprobleme.'},{role:'Heimindustrielle / Altbewohner',desc:'Mietpreisanstieg erzeugt Verdrängungsdruck; von Stadterneuerungsleistungen kaum profitiert.'},{role:'Cafés / Gästehäuser',desc:'Post-Regenerationszuzug; profitieren von und treiben Mietdynamik.'}],
    en:[{role:'Sinheung Market vendors',desc:'Mostly elderly traders; modernization and succession challenges.'},{role:'Home-industry workers / original residents',desc:'Displacement pressure from rising rents; largely excluded from regeneration benefits.'},{role:'Cafés / guesthouses',desc:'Post-regeneration newcomers; beneficiaries and drivers of rent dynamics.'}]},
  quote:'"설계 없이 형성된 혼합 용도가 어떻게 작동하는지 — 그리고 재생이 의도치 않게 그것을 해체하는 과정을 동시에 관찰할 수 있는 현장."'},

 {id:'spot3',num:3,
  ko:'소월로',de:'Sowol-ro',en:'Sowol-ro',
  sub:{ko:'남산 경계 가로',de:'Grenzstraße am Namsan',en:'Namsan Boundary Road'},
  tags:{
    ko:['경계 가로','남산 경관','보행 단절','차로 다이어트'],
    de:['Grenzstraße','Namsan-Panorama','Fußgängerunterbrechung','Straßenraumreduzierung'],
    en:['Boundary Road','Namsan Panorama','Pedestrian Severance','Road Diet']},
  bg:{
    ko:'소월로는 그랜드하얏트 호텔에서 남산도서관으로 이어지는 왕복 4차선 간선도로로, 남산 산턱을 따라 굽이치며 서울 도심을 향한 파노라마 조망이 펼쳐지는 구간이다. 서울에서 남산 경관 보호를 위한 고도 제한이 가장 엄격하게 적용되는 도로이기도 하다. 역사적으로 산복 도로에서 출발했으나, 시간이 지나면서 차량 흐름을 우선시한 간선 도로 단면이 굳어졌고, 경관 자원으로서의 잠재력은 유지하면서도 보행 환경은 오히려 열악해지는 방향으로 진행되어 왔다.',
    de:'Sowol-ro ist eine 4-spurige Hauptstraße vom Grand Hyatt Hotel zur Namsan-Bibliothek, die dem Berghang folgt und Panoramablicke auf die Innenstadt bietet. Historisch als Bergstraße angelegt, wurde sie zur fahrzeugdominierten Hauptachse — Landschaftspotenzial erhalten, Fußgängerqualität verschlechtert.',
    en:'Sowol-ro is a 4-lane arterial from the Grand Hyatt Hotel to the Namsan Library, winding along the mountain slope with panoramic views of central Seoul. Historically a hillside path, it evolved into a vehicle-priority arterial — retaining landscape potential while deteriorating pedestrian conditions.'},
  char:{
    ko:'소월로는 현재 남산과 해방촌·이태원 주거지 사이를 물리적으로 가르는 장벽으로 기능한다. 급경사 내리막 구간에서의 차량 과속, 좁고 단절된 보행로, 위험한 횡단 구간이 반복되며, 남산 쪽에서 주거지로 이어지는 수평·수직 보행 연결이 사실상 단절되어 있다. 동시에 이 도로는 서울 도심의 스카이라인을 조망할 수 있는 몇 안 되는 선형 경관축이기도 해서, 차량 통행과 보행 경험, 경관 향유 사이의 긴장이 가장 선명하게 드러나는 구간이다.',
    de:'Sowol-ro wirkt als physische Barriere zwischen dem Namsan-Park und den Wohngebieten Haebangchon/Itaewon. Bergab-Überschreitungen, schmale unterbrochene Gehwege und gefährliche Querungen kennzeichnen die Strecke. Zugleich ist es eine der wenigen Panoramaachsen Seouls.',
    en:'Sowol-ro currently functions as a physical barrier separating Namsan from Haebangchon and Itaewon residential areas. Downhill vehicle speeding, narrow disconnected sidewalks, and dangerous crossings recur throughout. Yet it remains one of Seoul\'s few linear panorama corridors.'},
  issues:{
    ko:['차량 우선의 도로 단면이 어떻게 남산과 주거지 사이의 보행 단절을 심화시키는지가 핵심 논점이다.','경관과 이동성 사이의 균형, 차로 구성의 재편 가능성을 검토해야 한다.','위(남산)와 아래(주거지)를 잇는 입체적 보행 네트워크의 구성 방안이 필요하다.','소월로가 단순한 통과 도로가 아니라 남산의 녹지와 주거지를 연결하는 공간으로 기능할 수 있는지 검토가 필요하다.'],
    de:['Wie die fahrzeugpriorisierte Straße die Fußgängerverbindung zwischen Namsan und Wohngebiet unterbricht, ist die Kernfrage.','Balance zwischen Landschaft und Mobilität; Potenzial einer Fahrspurreduzierung ist zu prüfen.','Mehrdimensionales Fußwegenetz zwischen Berg (Namsan) und Tal (Wohngebiet) ist zu entwickeln.','Kann Sowol-ro als Grünraumverbindung statt als bloße Durchfahrtsstraße fungieren?'],
    en:['How the vehicle-priority cross-section deepens pedestrian severance between Namsan and residential areas is the core question.','Balance between landscape and mobility; feasibility of road diet and lane reconfiguration needs examination.','A multi-level pedestrian network connecting the mountain (Namsan) to the neighborhood below needs to be devised.','Can Sowol-ro function as a green connector rather than a mere through-road?']},
  stakeholders:{
    ko:[{role:'보행·등산 이용자',desc:'남산공원 접근 수요. 횡단보도 위치·간격 개선 요구.'},{role:'서울시 (남산 르네상스)',desc:'소월로 보행화·녹지축 연결 정책 수립 주체.'},{role:'인근 건물주',desc:'녹지 접면부 지가 상승 기대와 보행화에 따른 접근 방식 변화 우려 공존.'}],
    de:[{role:'Fußgänger / Wanderer',desc:'Nachfrage nach Namsan-Zugang; fordern verbesserte Querungen.'},{role:'Stadt Seoul (Namsan Renaissance)',desc:'Zuständig für Fußgängerumgestaltung und Grünachsenplanung.'},{role:'Anliegende Eigentümer',desc:'Erwarten Wertsteigerung durch Grünraumnähe; besorgt um Fahrzeugzufahrt.'}],
    en:[{role:'Pedestrians / hikers',desc:'Demand Namsan access; request improved crosswalk locations.'},{role:'Seoul City (Namsan Renaissance)',desc:'Policy authority for Sowol-ro pedestrianization and green axis.'},{role:'Adjacent property owners',desc:'Expect value gains; concerned about changed vehicle access.'}]},
  quote:'"차량 통행과 보행 경험, 경관 향유 사이의 긴장이 가장 선명하게 드러나는 구간 — 그리고 남산-용산공원 녹지축의 핵심 고리."'},

 {id:'spot4',num:4,
  ko:'녹사평대로 & 용산공원 접면부',de:'Noksapyeong-daero & Yongsan-Park Randzone',en:'Noksapyeong-daero & Yongsan Park Interface',
  sub:{ko:'공원-도시 전이 공간과 생태 연결',de:'Park-Stadt-Übergang & Ökologische Vernetzung',en:'Park-City Transition & Ecological Connectivity'},
  tags:{
    ko:['대규모 공원','녹지-도시 접면','생태 연결','차로 다이어트'],
    de:['Großpark','Grünraum-Stadt-Interface','Ökologische Vernetzung','Straßenraumreduzierung'],
    en:['Large-scale Park','Green-Urban Interface','Ecological Connectivity','Road Diet']},
  bg:{
    ko:'녹사평역 일대는 향후 조성될 243만㎡ 규모의 용산공원과 기존 고밀 주거·상업지가 만나는 경계부다. 용산 미군기지가 반환되면서 국내 최대 규모의 도심 공원 조성이 본격화되었고, 이 일대는 거대한 자연과 고밀도 도시 사이의 전이 공간으로서 새로운 역할을 부여받았다. 동시에 남산-용산공원-한강으로 이어지는 서울의 핵심 생태축에서 남쪽 관문 역할을 하는 전략적 거점이기도 해, 도시 차원의 녹지 연결 논의가 이 지점을 중심으로 집중되고 있다.',
    de:'Die Umgebung der Station Noksapyeong ist die Kontaktzone zwischen dem entstehenden Yongsan-Park (2,43 Mio. m²) und bestehenden Wohn- und Gewerbegebieten. Als südliches Tor der Grünraumachse Namsan–Yongsan–Han-Fluss erhält dieser Ort strategische Bedeutung.',
    en:'The Noksapyeong Station area is where the emerging 2.43 million m² Yongsan Park meets existing high-density residential and commercial areas. As the southern gateway of the Namsan–Yongsan–Han River ecological axis, it holds strategic significance for city-scale green connectivity.'},
  char:{
    ko:'지하 수십 미터 깊이까지 자연 채광이 쏟아지는 녹사평역의 거대한 중정(Atrium) 구조는 공원과 도시를 잇는 기념비적 지하-지상 전이 공간으로서 훌륭한 잠재력을 지녔다. 그러나 지상부는 왕복 6~10차선에 달하는 녹사평대로의 넓은 차폭과 복잡한 교차로, 그리고 지형의 단차를 극복하기 위한 육교 중심의 동선이 지배적이다.',
    de:'Der gigantische Atrium der Station Noksapyeong — natürlich beleuchtet bis in große Tiefen — ist ein monumentaler unterirdisch-oberirdischer Übergangsraum mit großem Potenzial. Oberirdisch dominieren jedoch 6–10 Fahrspuren, komplexe Kreuzungen und Fußgängerbrücken.',
    en:'Noksapyeong Station\'s massive atrium — flooded with natural light dozens of meters underground — is a monumental underground-to-surface transition space with great potential. However, the surface is dominated by 6–10 lane roads, complex intersections, and overpass-centric pedestrian routing.'},
  issues:{
    ko:['대규모 공원이 주변 도시 조직에 어떤 파급 효과를 미치는지, 닫힌 담장과 차량 중심의 경계를 다공성 공간으로 어떻게 재설계할 것인지가 핵심 논점이다.','고립된 지하 역사 인프라부터 지상부의 차로 다이어트, 육교, 공원으로 이어지는 입체적 보행 및 생태 연결 방안이 필요하다.','공원 조성에 따른 주변 부동산 가치 상승과 개발 압력 등 현재 진행형인 도시 변화를 관찰하고 대응해야 한다.','남산-용산공원-한강을 잇는 도시 차원의 생태축 실현을 위한 전략적 연결 방안을 모색해야 한다.'],
    de:['Wie ein Großpark die umliegende Stadtstruktur transformiert und wie die Grenze von einer Barriere zu einem porösen Raum wird, ist die Kernfrage.','Vom isolierten U-Bahn-Atrium über Road Diet und Brücken bis zum Park — eine integrierte Fußgänger- und Grünraumstrategie ist nötig.','Steigende Grundstückswerte und Entwicklungsdruck durch die Parkanlage müssen beobachtet und gesteuert werden.','Strategie zur Realisierung der gesamtstädtischen Ökologieachse Namsan–Yongsan–Han-Fluss muss entwickelt werden.'],
    en:['How a large-scale park transforms surrounding urban fabric and how a closed barrier becomes porous space is the core question.','From the isolated underground atrium through road diet and overpasses to the park — an integrated pedestrian and ecological strategy is needed.','Rising property values and development pressure around the park must be observed and managed.','Strategies for realizing the city-scale ecological axis from Namsan through Yongsan Park to the Han River need to be developed.']},
  stakeholders:{
    ko:[{role:'인근 주거·상업 건물주',desc:'공원 개방에 따른 지가 상승 기대. 일부는 접근로 변화에 우려.'},{role:'서울시 / 국토부',desc:'용산공원 조성 주체. 주변 지구단위계획과 연계한 접면부 관리 필요.'},{role:'환경·시민단체',desc:'공원의 생태적 기능 유지 및 상업화 방지 촉구.'}],
    de:[{role:'Anliegende Eigentümer',desc:'Erwarten Wertsteigerung; teils besorgt über geänderte Erschließung.'},{role:'Stadt Seoul / Ministerium',desc:'Träger der Parkentwicklung; Randzonenmanagement mit Bebauungsplänen verknüpfen.'},{role:'Umwelt- und Bürgergruppen',desc:'Fordern Erhalt der Ökologie und Verhinderung der Kommerzialisierung.'}],
    en:[{role:'Adjacent property owners',desc:'Expect value gains from park proximity; some concerned about changed access.'},{role:'Seoul City / Ministry of Land',desc:'Park development authority; needs interface zone management linked with district plans.'},{role:'Environmental / civic groups',desc:'Demand preservation of ecological function and prevention of commercialization.'}]},
  quote:'"닫힌 담장과 차량 중심의 경계를 유기적으로 스며드는 다공성 공간으로 어떻게 재설계할 것인가 — 현재 진행형인 도시 변화의 최전선."'},

 {id:'spot5',num:5,
  ko:'경리단길 & 이태원로',de:'Gyeongnidan-gil & Itaewon-ro',en:'Gyeongnidan-gil & Itaewon-ro',
  sub:{ko:'자생적 상업 가로의 생애주기와 회복력',de:'Lebenszyklus der organischen Geschäftsstraße & Resilienz',en:'Life Cycle of Organic Commercial Streets & Resilience'},
  tags:{
    ko:['소필지 상업가로','젠트리피케이션 이후','도시 형태','재난 후 회복'],
    de:['Kleinteilige Geschäftsstraße','Post-Gentrifizierung','Stadtmorphologie','Post-Katastrophe-Resilienz'],
    en:['Small-lot Commercial Street','Post-gentrification','Urban Morphology','Post-disaster Recovery']},
  bg:{
    ko:'이태원 메인 상권과는 다른 결을 가진 소필지 기반의 자생적 상업 가로다. 경리단길은 인근 군부대와 외국인 거주자를 배경으로 형성된 골목 상권에서 출발해 2010년대 중반 급격한 상업화를 겪었으나, 이후 젠트리피케이션의 직격탄을 맞으며 현재는 공실화와 업종 전환이 진행 중이다. 해방촌보다 한 사이클 앞선 상업화 이후 단계를 관찰할 수 있어, 자생적 상업 가로의 변이 과정을 추적하기에 적합한 현장이다. 이태원로 일대는 다국적 상점과 커뮤니티가 밀집한 활성 상권으로, 1층 상업과 상층부 주거가 결합한 수직적 혼합 용도가 계획 없이 자연스럽게 형성된 곳이다. 2022년 이태원 참사 이후 상권이 크게 위축되었으나, 2024~2025년을 거치며 부분적 회복세를 보이고 있다.',
    de:'Gyeongnidan-gil ist eine kleinteilige organische Geschäftsstraße, die nach einem Gentrifizierungsboom in den 2010er-Jahren nun Leerstand und Nutzungswandel erlebt — einen Zyklus vor Haebangchon. Itaewon-ro ist eine aktive multinationale Handelsstraße mit organisch gewachsener vertikaler Nutzungsmischung. Nach dem Unglück 2022 starker Rückgang, seit 2024–25 teilweise Erholung.',
    en:'Gyeongnidan-gil is a small-lot organic commercial street that peaked with rapid commercialization in the mid-2010s, then suffered the full impact of gentrification — now in post-gentrification vacancy and business turnover, one cycle ahead of Haebangchon. Itaewon-ro is an active multinational strip with organically formed vertical mixed-use. Post-2022 sharp decline, partial recovery from 2024–25.'},
  char:{
    ko:'도로를 경계로 필지 규모와 건물 유형이 급변하는 구간이 많아, 도시 형태학적 분석의 좋은 대상이다. 좁고 경사진 골목에 밀집된 상권, 차량과 보행자가 혼재하는 협소 가로, 건물 유형의 급격한 전환이 짧은 거리 안에서 공존한다. 참사 이후 상권 회복 과정에서 이 일대의 물리적 공간이 어떤 방식으로 재편되고 있는지를 현재 진행형으로 관찰할 수 있다.',
    de:'Zahlreiche Abschnitte mit abruptem Parzellen- und Gebäudetypenwechsel machen den Ort ideal für Stadtmorphologieanalysen. Enge, steile Gassen, Mischverkehr und schnelle Bautypentransitionen auf kurzem Abstand. Post-2022 Erholung des Handelslebens ist direkt beobachtbar.',
    en:'Many sections with abrupt changes in lot scale and building type make this ideal for urban morphology analysis. Narrow sloped alleys, mixed vehicle-pedestrian traffic, and rapid building-type transitions coexist within short distances. Post-2022 commercial recovery is directly observable in progress.'},
  issues:{
    ko:['젠트리피케이션의 사이클을 거쳐 쇠퇴를 겪고 있는 상업 가로의 물리적 환경을 어떻게 읽을 것인지가 논점이다.','수직적 혼합 용도가 밀집한 협소 가로와 경사지에서 보행자 흐름의 분산과 공공 안전 확보가 어떻게 가능한지 검토해야 한다.','이태원 참사 이후 상권 회복 과정에서 공간 설계가 어떤 역할을 할 수 있는지가 핵심 쟁점이다.','경리단길과 이태원로라는 서로 다른 단계에 놓인 두 가로를 비교하며 도시 상업 가로의 생애 주기를 탐색할 수 있다.'],
    de:['Wie liest man die physische Umgebung einer durch Gentrifizierungszyklen geschwächten Geschäftsstraße?','Wie lässt sich Fußgängerverteilung und öffentliche Sicherheit in engen, geneigten Straßen mit vertikaler Nutzungsmischung gewährleisten?','Welche Rolle kann räumliches Design im Post-Katastrophen-Erholungsprozess spielen?','Vergleich der beiden Straßen auf verschiedenen Zyklenständen ermöglicht Einblicke in den Lebenszyklus von Geschäftsstraßen.'],
    en:['How to read the physical environment of a commercial street cycling through gentrification and decline is the key question.','How to ensure pedestrian distribution and public safety in narrow, sloped streets with dense vertical mixed-use needs examination.','What role can spatial design play in the post-disaster commercial recovery process is a central issue.','Comparing Gyeongnidan-gil and Itaewon-ro at different cycle stages enables exploration of commercial street life cycles.']},
  stakeholders:{
    ko:[{role:'소규모 자영업자',desc:'임대료 부담 및 프랜차이즈 대비 경쟁 열위.'},{role:'이태원 상인연합',desc:'상권 회복 및 이미지 개선 캠페인 추진.'},{role:'외국인 거주·방문객',desc:'이태원 상권의 핵심 수요층. 문화적 다양성 유지 기대.'}],
    de:[{role:'Kleingewerbetreibende',desc:'Mietlastdruck und Wettbewerbsnachteil gegenüber Franchise.'},{role:'Itaewon Händlerverband',desc:'Kampagnen zur Geschäftsbelebung und Imageverbesserung.'},{role:'Ausländische Bewohner / Besucher',desc:'Kernnachfrage; erwarten Erhalt der kulturellen Vielfalt.'}],
    en:[{role:'Small business operators',desc:'High rent burden and competitive disadvantage vs. franchises.'},{role:'Itaewon Merchants Association',desc:'Pursuing recovery and image improvement campaigns.'},{role:'Foreign residents / visitors',desc:'Core demand base; expect preservation of cultural diversity.'}]},
  quote:'"자생적 상업 가로의 생애 주기와 물리적 환경 사이의 관계를 두 가로의 비교를 통해 다각도로 탐색할 수 있는 현장."'},

  document.getElementById('sv-content').style.display=v==='simple'?'block':'none';

/* ── ROUTER ── */
function go(id){ location.hash=id; }
function updateNav(){
  const DM_ORDER=['home','site','sched','gloss'];
  DM_ORDER.forEach(k=>{
    const el=document.getElementById('dm-'+k);
    if(el) el.textContent=NAV[k][LANG]||NAV[k].en;
  });
  document.getElementById('f-right').textContent=FOOTER[LANG]||FOOTER.en;
}
function toggleMenu(){
  document.getElementById('drop-menu').classList.toggle('open');
}
function menuGo(id){
  document.getElementById('drop-menu').classList.remove('open');
  go(id);
}
document.addEventListener('click',function(e){
  const menu=document.getElementById('drop-menu');
  const btn=document.getElementById('ham-btn');
  if(menu&&btn&&!menu.contains(e.target)&&!btn.contains(e.target)){
    menu.classList.remove('open');
  }
});
function setLang(l){
  LANG=l;
  ['ko','de','en'].forEach(x=>document.getElementById('lb-'+x).classList.toggle('on',x===l));
  document.documentElement.lang=l;
  localStorage.setItem('snu-tuw-lang',l);
  updateNav();
  render();
}
function render(){
  const hash=location.hash.replace('#','')||'home';
  const spot=SPOTS.find(s=>s.id===hash);
  let html='';
  if(hash==='home') html=renderHome();
  else if(hash==='site') html=renderSite();
  else if(hash==='gloss') html=renderGloss();
  else if(hash==='sched') html=renderSched();
  else if(spot) html=renderSpot(spot);
  else html=renderHome();
  document.getElementById('app').innerHTML=html;
  window.scrollTo(0,0);
  ['home','site','sched','gloss'].forEach(id=>{
    const el=document.getElementById('dm-'+id);
    if(el) el.classList.toggle('on', hash===id||(id==='site'&&!!spot));
  });
}
window.addEventListener('hashchange',render);
